<script type="application/json" id="gossamer-gloss-json">[{"definitions":[{"backrefs":[{"href":"001-caloric.html#term-001-caloric-1","label":"1","podNum":"1"}],"definition":"attributed to Max Planck. A version appears in his Scientific Autobiography (1949): \"A new scientific truth does not triumph by convincing its opponents and making them see the light, but rather because its opponents eventually die and a new generation grows up that is familiar with it.\""}],"slug":"science-advances-one-funeral-at-a-time","term":"Science advances one funeral at a time"},{"definitions":[{"backrefs":[{"href":"001-caloric.html#term-001-caloric-1","label":"1","podNum":"1"}],"definition":"TBD"}],"slug":"history-of-science","term":"history-of-science"},{"definitions":[{"backrefs":[{"href":"001-caloric.html#term-001-caloric-2","label":"1","podNum":"1"}],"definition":"Thomas Kuhn's term for the revolutionary replacement of one scientific framework by another, as distinct from normal cumulative progress. From The Structure of Scientific Revolutions (1962, University of Chicago Press)."}],"slug":"paradigm-shift","term":"Paradigm shift"},{"definitions":[{"backrefs":[{"href":"001-caloric.html#term-001-caloric-3","label":"1","podNum":"1"}],"definition":"Whitehead's term for the error of mistaking a useful abstraction for the underlying concrete reality. Appears throughout Process and Reality (1929)."},{"backrefs":[{"href":"002-events.html#fn-002-events-1-mark","label":"2-1","podNum":"2"}],"definition":"Alfred North Whitehead's term for the error of treating an abstraction as if it were the concrete reality. The paradigm case: treating the particle, a scientific abstraction useful for calculation, as the fundamental unit of nature, while forgetting that it was abstracted from the concrete flow of events."},{"backrefs":[{"href":"021-just.html#term-021-just-2","label":"21","podNum":"21"}],"definition":"Whitehead's term for mistaking a useful abstraction for the full concrete reality it was extracted from. Process and Reality (1929)."}],"slug":"fallacy-of-misplaced-concreteness","term":"Fallacy of misplaced concreteness"},{"definitions":[{"backrefs":[{"href":"001-caloric.html#term-001-caloric-4","label":"1","podNum":"1"},{"href":"008-fields.html#term-008-fields-1","label":"8","podNum":"8"},{"href":"025-widechannel.html#term-025-widechannel-1","label":"25","podNum":"25"},{"href":"069-love.html#term-069-love-1","label":"69","podNum":"69"}],"definition":"TBD"}],"slug":"consciousness","term":"consciousness"},{"definitions":[{"backrefs":[{"href":"001-caloric.html#term-001-caloric-5","label":"1","podNum":"1"}],"definition":"philosopher David Chalmers' term for the question of why physical processes give rise to subjective experience at all. From Facing Up to the Problem of Consciousness, Journal of Consciousness Studies (1995)."}],"slug":"hard-problem","term":"hard problem"},{"definitions":[{"backrefs":[{"href":"001-caloric.html#term-001-caloric-6","label":"1","podNum":"1"},{"href":"011-moreisdifferent.html#term-011-moreisdifferent-2","label":"11","podNum":"11"},{"href":"017-pastpresent.html#term-017-pastpresent-2","label":"17","podNum":"17"},{"href":"022-locked.html#term-022-locked-6","label":"22","podNum":"22"},{"href":"025-widechannel.html#term-025-widechannel-2","label":"25","podNum":"25"},{"href":"047-ai-feeling.html#term-047-ai-feeling-1","label":"47","podNum":"47"},{"href":"048-flashes.html#term-048-flashes-2","label":"48","podNum":"48"},{"href":"065-feel-do.html#term-065-feel-do-1","label":"65","podNum":"65"}],"definition":"TBD"}],"slug":"ai","term":"AI"},{"definitions":[{"backrefs":[{"href":"002-events.html#term-002-events-1","label":"2","podNum":"2"}],"definition":"in quantum field theory, the fundamental entities are fields that pervade space. Particles are localized excitations of these fields, brought into being by interactions and resolved by others. The field is ontologically primary; the particle is a derived event."}],"slug":"quantum-field","term":"Quantum field"},{"definitions":[{"backrefs":[{"href":"002-events.html#fn-002-events-1-mark","label":"2-1","podNum":"2"}],"definition":"Whitehead's term for the fundamental unit of reality: a discrete event of becoming. Enduring objects are families (Whitehead: \"societies\") of actual occasions whose pattern is stable enough to appear permanent. The occasion is primary; the object is derivative."},{"backrefs":[{"href":"003-inside.html#term-003-inside-1","label":"3","podNum":"3"}],"definition":"Alfred North Whitehead's term for the fundamental unit of reality: a discrete event of becoming that takes in its environment, integrates it, and completes itself. Enduring objects are families (Whitehead: \"societies\") of actual occasions stable enough to appear permanent."},{"backrefs":[{"href":"004-self.html#term-004-self-4","label":"4","podNum":"4"}],"definition":"Whitehead's fundamental unit of reality, an event that prehends its past, integrates, and perishes into the next."},{"backrefs":[{"href":"009-randomness.html#term-009-randomness-10","label":"9","podNum":"9"}],"definition":"Whitehead's term for the fundamental unit of reality; a moment of experience that takes in its world, reaches a decision, and completes into the next occasion's inheritance."}],"slug":"actual-occasion","term":"Actual occasion"},{"definitions":[{"backrefs":[{"href":"002-events.html#term-002-events-1","label":"2","podNum":"2"}],"definition":"Carlo Rovelli's interpretation of quantum mechanics, in which quantum states are relative to observers or measuring systems rather than absolute. Properties do not exist independently of interactions."}],"slug":"relational-quantum-mechanics","term":"Relational quantum mechanics"},{"definitions":[{"backrefs":[{"href":"002-events.html#fn-002-events-4-mark","label":"2-4","podNum":"2"}],"definition":"Wittgenstein's term for the way members of a category (chairs, games, languages) share overlapping similarities without any single feature common to all. The category is held together by a web of resemblances, not by a shared essence."}],"slug":"family-resemblance","term":"Family resemblance"},{"definitions":[{"backrefs":[{"href":"003-inside.html#term-003-inside-1","label":"3","podNum":"3"}],"definition":"TBD"}],"slug":"experience","term":"experience"},{"definitions":[{"backrefs":[{"href":"003-inside.html#fn-003-inside-1-mark","label":"3-1","podNum":"3"}],"definition":"Whitehead's term for the way each actual occasion takes in and registers what surrounds it before completing itself. Plain English equivalent: feeling, taking-in. The root is the same as \"apprehend.\""},{"backrefs":[{"href":"004-self.html#term-004-self-2","label":"4","podNum":"4"}],"definition":"Whitehead's term for the way each moment of experience actively feels and inherits the preceding moment."},{"backrefs":[{"href":"007-vacuum.html#term-007-vacuum-4","label":"7","podNum":"7"}],"definition":"The way one occasion takes in or \"feels\" another; the field is the medium through which occasions prehend each other."},{"backrefs":[{"href":"008-fields.html#fn-008-fields-2-mark","label":"8-2","podNum":"8"}],"definition":"Alfred North Whitehead's term for the fundamental act by which any event takes in and is shaped by what surrounds it. Not a metaphor for perception but a proposed feature of reality at every scale: each occasion reaches out and feels its environment before it can become itself. Whitehead argued the electromagnetic field is the physical medium through which this reaching occurs."},{"backrefs":[{"href":"013-enactment.html#term-013-enactment-2","label":"13","podNum":"13"}],"definition":"Whitehead's term for how an occasion takes in its context; enactivism describes prehension at the scale of the organism."},{"backrefs":[{"href":"016-neuralnetwork.html#term-016-neuralnetwork-2","label":"16","podNum":"16"}],"definition":"The way occasions take in their past; the network's \"taking in\" of weights and activations is prehension."},{"backrefs":[{"href":"017-pastpresent.html#term-017-pastpresent-3","label":"17","podNum":"17"}],"definition":"For Whitehead, each occasion takes in its entire relevant past as fully present; the transformer's attention is a technical analogue."},{"backrefs":[{"href":"028-network.html#term-028-network-4","label":"28","podNum":"28"}],"definition":"Whitehead's term for the way each event takes in and responds to prior events. The basic relational act of reality."},{"backrefs":[{"href":"050-orthogonal.html#term-050-orthogonal-2","label":"50","podNum":"50"}],"definition":"Whitehead's term for how occasions take in their world; the interior dimension of process."},{"backrefs":[{"href":"080-unification.html#term-080-unification-3","label":"80","podNum":"80"}],"definition":"Whitehead's term for the process by which each actual occasion grasps, feels, and incorporates prior occasions into a new unity, the mechanism by which the many become one."}],"slug":"prehension","term":"Prehension"},{"definitions":[{"backrefs":[{"href":"003-inside.html#term-003-inside-2","label":"3","podNum":"3"}],"definition":"the philosophical position that experience or mind is a fundamental and ubiquitous feature of reality, not a late biological product. Distinguished from animism (which attributes spirits or agency to natural objects) by its grounding in rigorous argument rather than cultural tradition."},{"backrefs":[{"href":"028-network.html#term-028-network-5","label":"28","podNum":"28"}],"definition":"the philosophical position that experience or something like it is a fundamental and ubiquitous feature of reality, not a late biological emergence. Distinguished from animism by its philosophical rigor; from mysticism by its grounding in physics and mathematics."}],"slug":"panpsychism","term":"Panpsychism"},{"definitions":[{"backrefs":[{"href":"003-inside.html#fn-003-inside-3-mark","label":"3-3","podNum":"3"}],"definition":"David Chalmers' term (1995) for the question of why any physical process gives rise to subjective experience at all. Distinguished from the \"easy problems\" of explaining attention, memory, and behavior, which are hard in practice but tractable in principle. The hard problem is why there is something it is like to be a system at all."}],"slug":"hard-problem-of-consciousness","term":"Hard problem of consciousness"},{"definitions":[{"backrefs":[{"href":"004-self.html#term-004-self-1","label":"4","podNum":"4"}],"definition":"TBD"}],"slug":"self","term":"self"},{"definitions":[{"backrefs":[{"href":"004-self.html#term-004-self-3","label":"4","podNum":"4"}],"definition":"TBD"}],"slug":"buddhism","term":"buddhism"},{"definitions":[{"backrefs":[{"href":"004-self.html#fn-004-self-3-mark","label":"4-3","podNum":"4"}],"definition":"The Buddhist doctrine of no fixed self; experience arises moment to moment with no underlying owner."}],"slug":"anatta","term":"Anatta"},{"definitions":[{"backrefs":[{"href":"004-self.html#term-004-self-5","label":"4","podNum":"4"}],"definition":"TBD"}],"slug":"identity","term":"identity"},{"definitions":[{"backrefs":[{"href":"005-freewill.html#term-005-freewill-1","label":"5","podNum":"5"}],"definition":"TBD"}],"slug":"determinism","term":"determinism"},{"definitions":[{"backrefs":[{"href":"005-freewill.html#term-005-freewill-2","label":"5","podNum":"5"}],"definition":"TBD"}],"slug":"free-will","term":"free-will"},{"definitions":[{"backrefs":[{"href":"005-freewill.html#term-005-freewill-3","label":"5","podNum":"5"}],"definition":"In process philosophy, each occasion's moment of decision that cannot be fully predicted from its past."}],"slug":"self-determination","term":"Self-determination"},{"definitions":[{"backrefs":[{"href":"005-freewill.html#term-005-freewill-4","label":"5","podNum":"5"}],"definition":"Whitehead's term for the irreducible novelty introduced by each occasion as it resolves possibility into actuality."},{"backrefs":[{"href":"058-galacticnets.html#term-058-galacticnets-2","label":"58","podNum":"58"}],"definition":"Whitehead's term for the universe's ongoing production of novelty; here applied across scales."}],"slug":"creative-advance","term":"Creative advance"},{"definitions":[{"backrefs":[{"href":"005-freewill.html#term-005-freewill-5","label":"5","podNum":"5"}],"definition":"TBD"}],"slug":"creativity","term":"creativity"},{"definitions":[{"backrefs":[{"href":"006-output.html#term-006-output-1","label":"6","podNum":"6"}],"definition":"used here in the broadest sense: any process that selects a next state given a current one. Deliberately spans thermostats and minds."}],"slug":"prediction","term":"Prediction"},{"definitions":[{"backrefs":[{"href":"006-output.html#term-006-output-2","label":"6","podNum":"6"}],"definition":"in Whitehead's sense, the actual unfolding activity of an occasion of experience. Distinct from its products or traces."},{"backrefs":[{"href":"036-universenoticing.html#term-036-universenoticing-1","label":"36","podNum":"36"}],"definition":"TBD"}],"slug":"process","term":"Process"},{"definitions":[{"backrefs":[{"href":"006-output.html#term-006-output-3","label":"6","podNum":"6"}],"definition":"the channel through which a process expresses itself externally. The interface constrains and shapes what can be expressed; it does not determine what is being expressed."}],"slug":"output-interface","term":"Output interface"},{"definitions":[{"backrefs":[{"href":"006-output.html#term-006-output-1","label":"6","podNum":"6"}],"definition":"TBD"}],"slug":"intelligence","term":"intelligence"},{"definitions":[{"backrefs":[{"href":"007-vacuum.html#term-007-vacuum-1","label":"7","podNum":"7"}],"definition":"In QFT, short-lived excitations of the vacuum that contribute to processes; not \"things\" but possibilities being sampled."}],"slug":"virtual-particle","term":"Virtual particle"},{"definitions":[{"backrefs":[{"href":"007-vacuum.html#term-007-vacuum-2","label":"7","podNum":"7"}],"definition":"Whitehead's pure possibilities that occasions select from and realize; the quantum vacuum's virtual states are a physical analogue."},{"backrefs":[{"href":"066-cosmicattractor.html#term-066-cosmicattractor-1","label":"66","podNum":"66"}],"definition":"The realm of possibility that God holds available; occasions select from it in their self-determination."}],"slug":"eternal-objects","term":"Eternal objects"},{"definitions":[{"backrefs":[{"href":"007-vacuum.html#term-007-vacuum-3","label":"7","podNum":"7"},{"href":"008-fields.html#term-008-fields-3","label":"8","podNum":"8"},{"href":"016-neuralnetwork.html#term-016-neuralnetwork-3","label":"16","podNum":"16"},{"href":"029-lighttime.html#term-029-lighttime-7","label":"29","podNum":"29"},{"href":"030-interference.html#term-030-interference-3","label":"30","podNum":"30"}],"definition":"TBD"}],"slug":"fields","term":"fields"},{"definitions":[{"backrefs":[{"href":"008-fields.html#term-008-fields-2","label":"8","podNum":"8"},{"href":"009-randomness.html#term-009-randomness-1","label":"9","podNum":"9"},{"href":"028-network.html#term-028-network-2","label":"28","podNum":"28"},{"href":"063-mandelcrystals.html#term-063-mandelcrystals-3","label":"63","podNum":"63"}],"definition":"TBD"}],"slug":"physics","term":"physics"},{"definitions":[{"backrefs":[{"href":"008-fields.html#term-008-fields-4","label":"8","podNum":"8"}],"definition":"the unified field described by James Clerk Maxwell's equations (1865), of which electricity, magnetism, and light are all aspects. Not a medium that contains these phenomena but the phenomenon itself. Pervades all of space."}],"slug":"electromagnetic-field","term":"Electromagnetic field"},{"definitions":[{"backrefs":[{"href":"008-fields.html#fn-008-fields-1-mark","label":"8-1","podNum":"8"}],"definition":"TBD"}],"slug":"electromagnetism","term":"electromagnetism"},{"definitions":[{"backrefs":[{"href":"008-fields.html#term-008-fields-1","label":"8","podNum":"8"}],"definition":"what the electromagnetic field does when a charged particle accelerates. The disturbance propagates outward as light. A stationary charge is silent; only acceleration speaks."}],"slug":"radiation","term":"Radiation"},{"definitions":[{"backrefs":[{"href":"008-fields.html#term-008-fields-1","label":"8","podNum":"8"}],"definition":"the spreading and interference of waves when they pass through a gap or around an obstacle. Visible when light passes through a mesh screen. Evidence that light is a field phenomenon, not a particle traveling a straight path."}],"slug":"diffraction","term":"Diffraction"},{"definitions":[{"backrefs":[{"href":"009-randomness.html#term-009-randomness-1","label":"9","podNum":"9"}],"definition":"the process by which a system in a perfectly symmetric but unstable state falls into an asymmetric lower-energy state through random perturbation, and stays there. The mechanism behind crystal formation, dune building, and the large-scale structure of the universe."}],"slug":"spontaneous-symmetry-breaking","term":"Spontaneous symmetry breaking"},{"definitions":[{"backrefs":[{"href":"009-randomness.html#term-009-randomness-2","label":"9","podNum":"9"},{"href":"012-autopoiesis.html#term-012-autopoiesis-5","label":"12","podNum":"12"},{"href":"032-skyfossil.html#term-032-skyfossil-1","label":"32","podNum":"32"},{"href":"041-colorwheel.html#term-041-colorwheel-5","label":"41","podNum":"41"},{"href":"045-baldwin.html#term-045-baldwin-1","label":"45","podNum":"45"},{"href":"059-galaxyevolve.html#term-059-galaxyevolve-1","label":"59","podNum":"59"}],"definition":"TBD"}],"slug":"evolution","term":"evolution"},{"definitions":[{"backrefs":[{"href":"009-randomness.html#term-009-randomness-3","label":"9","podNum":"9"},{"href":"011-moreisdifferent.html#term-011-moreisdifferent-1","label":"11","podNum":"11"}],"definition":"TBD"}],"slug":"complexity","term":"complexity"},{"definitions":[{"backrefs":[{"href":"009-randomness.html#term-009-randomness-4","label":"9","podNum":"9"}],"definition":"a network of molecules in which each member's production is catalyzed by other members of the set. Stuart Kauffman's demonstration that chemistry at sufficient complexity spontaneously organizes itself without external direction."}],"slug":"autocatalytic-set","term":"Autocatalytic set"},{"definitions":[{"backrefs":[{"href":"009-randomness.html#term-009-randomness-5","label":"9","podNum":"9"}],"definition":"the property of living systems that continuously produce the very components that sustain them; coined by Maturana and Varela. The cell does not merely use its components but makes them, circularly, as the condition of its own continued existence."},{"backrefs":[{"href":"012-autopoiesis.html#term-012-autopoiesis-3","label":"12","podNum":"12"}],"definition":"Maturana and Varela's term for a system that continuously produces the very components that constitute and maintain it. The defining organizational property of living systems."}],"slug":"autopoiesis","term":"Autopoiesis"},{"definitions":[{"backrefs":[{"href":"009-randomness.html#term-009-randomness-6","label":"9","podNum":"9"}],"definition":"a solution that is better than all its immediate neighbors but not the best solution overall. The trap that pure hill-climbing optimization falls into; escaped by introducing randomness into the search."}],"slug":"local-maximum","term":"Local maximum"},{"definitions":[{"backrefs":[{"href":"009-randomness.html#term-009-randomness-7","label":"9","podNum":"9"}],"definition":"an optimization technique borrowed from metallurgy that uses controlled randomness to escape local maxima. By occasionally accepting worse solutions, the algorithm avoids getting trapped and finds better global solutions. Used in engineering, chip design, and AI training."}],"slug":"simulated-annealing","term":"Simulated annealing"},{"definitions":[{"backrefs":[{"href":"009-randomness.html#term-009-randomness-8","label":"9","podNum":"9"}],"definition":"the training algorithm used in neural networks that deliberately injects randomness into each optimization step. Pure deterministic optimization gets trapped in local minima; the randomness keeps the search moving toward better solutions."}],"slug":"stochastic-gradient-descent","term":"Stochastic gradient descent"},{"definitions":[{"backrefs":[{"href":"009-randomness.html#term-009-randomness-9","label":"9","podNum":"9"}],"definition":"Whitehead's term for the irreducible self-determination at the heart of each actual occasion; the source of genuine newness in the universe that cannot be fully predicted from prior causes."}],"slug":"creative-advance-into-novelty","term":"Creative advance into novelty"},{"definitions":[{"backrefs":[{"href":"010-largenumbers.html#term-010-largenumbers-1","label":"10","podNum":"10"}],"definition":"TBD"}],"slug":"gödels-incompleteness-the-result-that-any-consistent-formal-system-of-sufficient-strength-contains-true-statements-it-cannot-prove-constructed-via-a-number-encoding-self-reference","term":"Gödels incompleteness, \"The result that any consistent formal system of sufficient strength contains true statements it cannot prove; constructed via a number encoding self-reference.\""},{"definitions":[{"backrefs":[{"href":"010-largenumbers.html#term-010-largenumbers-2","label":"10","podNum":"10"}],"definition":"The appearance of qualitatively new properties or capacities when simpler processes accumulate or nest beyond a threshold."},{"backrefs":[{"href":"011-moreisdifferent.html#term-011-moreisdifferent-5","label":"11","podNum":"11"},{"href":"020-penrose.html#term-020-penrose-1","label":"20","podNum":"20"}],"definition":"TBD"}],"slug":"emergence","term":"Emergence"},{"definitions":[{"backrefs":[{"href":"011-moreisdifferent.html#term-011-moreisdifferent-1","label":"11","podNum":"11"}],"definition":"Philip Anderson's phrase (1972) for the principle that each level of complexity has emergent properties that cannot be derived from the level below. Not a violation of lower-level laws, but genuinely new phenomena requiring their own description."}],"slug":"more-is-different","term":"More is different"},{"definitions":[{"backrefs":[{"href":"011-moreisdifferent.html#term-011-moreisdifferent-3","label":"11","podNum":"11"}],"definition":"Arthur Koestler's term for any entity that is simultaneously a whole in its own right and a part of a larger whole. Reality in Koestler's picture is a nested hierarchy of holons rather than parts assembling into wholes."},{"backrefs":[{"href":"024-ghostmachine.html#term-024-ghostmachine-2","label":"24","podNum":"24"}],"definition":"Koestler's term for a whole that is also a part of a larger whole; each level has genuine interiority."},{"backrefs":[{"href":"037-assembly.html#term-037-assembly-1","label":"37","podNum":"37"}],"definition":"Koestler's whole\/part; the stable \"sentence\" at one level becomes the \"word\" at the next."}],"slug":"holon","term":"Holon"},{"definitions":[{"backrefs":[{"href":"011-moreisdifferent.html#term-011-moreisdifferent-4","label":"11","podNum":"11"}],"definition":"Koestler's term for the collision of two independent frames of reference that releases energy as laughter, insight, or aesthetic emotion. His claim: this is the common structure of humor, scientific discovery, and artistic creation."}],"slug":"bisociation","term":"Bisociation"},{"definitions":[{"backrefs":[{"href":"011-moreisdifferent.html#term-011-moreisdifferent-6","label":"11","podNum":"11"}],"definition":"Whitehead's term for a stable pattern of events organized around a common characteristic that persists through time. Ant colonies, cities, brains, and neural networks are all societies in this sense."}],"slug":"society-of-actual-occasions","term":"Society of actual occasions"},{"definitions":[{"backrefs":[{"href":"012-autopoiesis.html#term-012-autopoiesis-1","label":"12","podNum":"12"}],"definition":"TBD"}],"slug":"life","term":"life"},{"definitions":[{"backrefs":[{"href":"012-autopoiesis.html#term-012-autopoiesis-2","label":"12","podNum":"12"}],"definition":"TBD"}],"slug":"cells","term":"cells"},{"definitions":[{"backrefs":[{"href":"012-autopoiesis.html#term-012-autopoiesis-4","label":"12","podNum":"12"}],"definition":"TBD"}],"slug":"entropy","term":"entropy"},{"definitions":[{"backrefs":[{"href":"012-autopoiesis.html#fn-012-autopoiesis-2-mark","label":"12-2","podNum":"12"}],"definition":"Whitehead's term for a persistent pattern of actual occasions organized with sufficient coherence and closure to act as a unit through time. The metaphysical counterpart to the autopoietic organization."},{"backrefs":[{"href":"014-cities.html#term-014-cities-1","label":"14","podNum":"14"}],"definition":"Whitehead's term for a stable pattern of events with a common character; a city is a society of human occasions."},{"backrefs":[{"href":"037-assembly.html#term-037-assembly-2","label":"37","podNum":"37"}],"definition":"Whitehead's persistent pattern of events that functions as vocabulary for the next level."}],"slug":"society-of-occasions","term":"society of occasions"},{"definitions":[{"backrefs":[{"href":"012-autopoiesis.html#term-012-autopoiesis-1","label":"12","podNum":"12"}],"definition":"Schrödinger's term for the ordered structure that living systems import from their environment to offset internal disorder. The thermodynamic face of what autopoiesis achieves organizationally."}],"slug":"negative-entropy","term":"negative entropy"},{"definitions":[{"backrefs":[{"href":"013-enactment.html#fn-013-enactment-1-mark","label":"13-1","podNum":"13"}],"definition":"The view that cognition is not representation of a pregiven world but the enactment of a world through embodied action."}],"slug":"enactivism","term":"Enactivism"},{"definitions":[{"backrefs":[{"href":"013-enactment.html#term-013-enactment-1","label":"13","podNum":"13"},{"href":"022-locked.html#term-022-locked-3","label":"22","podNum":"22"}],"definition":"TBD"}],"slug":"cognition","term":"cognition"},{"definitions":[{"backrefs":[{"href":"015-aliens.html#term-015-aliens-1","label":"15","podNum":"15"}],"definition":"TBD"}],"slug":"culture","term":"culture"},{"definitions":[{"backrefs":[{"href":"016-neuralnetwork.html#term-016-neuralnetwork-1","label":"16","podNum":"16"},{"href":"053-dimensions.html#term-053-dimensions-3","label":"53","podNum":"53"}],"definition":"TBD"}],"slug":"neural-networks","term":"neural-networks"},{"definitions":[{"backrefs":[{"href":"017-pastpresent.html#term-017-pastpresent-1","label":"17","podNum":"17"}],"definition":"The neural architecture that holds full context in parallel and attends over it; time becomes spatial in the representation."}],"slug":"transformer","term":"Transformer"},{"definitions":[{"backrefs":[{"href":"017-pastpresent.html#term-017-pastpresent-4","label":"17","podNum":"17"}],"definition":"TBD"}],"slug":"memory","term":"memory"},{"definitions":[{"backrefs":[{"href":"018-magnetization.html#term-018-magnetization-1","label":"18","podNum":"18"}],"definition":"a change in the state of a system, liquid to solid, disordered to ordered, uncommitted to aligned. Requires the medium to be in the right condition (cooled, supersaturated, primed) and seeds to initiate the shift."}],"slug":"phase-transition","term":"phase transition"},{"definitions":[{"backrefs":[{"href":"018-magnetization.html#term-018-magnetization-2","label":"18","podNum":"18"}],"definition":"a region within a ferromagnetic material where atomic spins are aligned. Domains grow by recruiting neighbors at their boundaries until the whole material is magnetized."}],"slug":"magnetic-domain","term":"magnetic domain"},{"definitions":[{"backrefs":[{"href":"018-magnetization.html#term-018-magnetization-1","label":"18","podNum":"18"}],"definition":"the formation of small ordered regions (nuclei or seeds) within a disordered medium. The seeds provide a template that neighboring elements can join, initiating a phase transition."}],"slug":"nucleation","term":"nucleation"},{"definitions":[{"backrefs":[{"href":"018-magnetization.html#term-018-magnetization-2","label":"18","podNum":"18"}],"definition":"the critical moment when isolated clusters become a connected network. Before it, seeds are islands; after it, they form a continent and the remaining disorder is surrounded."}],"slug":"percolation-threshold","term":"percolation threshold"},{"definitions":[{"backrefs":[{"href":"019-funerals.html#fn-019-funerals-1-mark","label":"19-1","podNum":"19"}],"definition":"Kuhn's term for the framework of assumptions and practices that defines normal science until crisis and revolution."},{"backrefs":[{"href":"027-usedtothink.html#term-027-usedtothink-3","label":"27","podNum":"27"}],"definition":"Thomas Kuhn's term for the framework of assumptions, methods, and exemplary problems that defines normal science in a given period. The paradigm is not a theory, it is the background against which theories are tested. Scientists inside a paradigm generally cannot see it as a paradigm; it simply looks like reality."}],"slug":"paradigm","term":"Paradigm"},{"definitions":[{"backrefs":[{"href":"019-funerals.html#term-019-funerals-1","label":"19","podNum":"19"}],"definition":"The mechanism by which new paradigms prevail, not by convincing holdouts but by outlasting them."}],"slug":"generational-replacement","term":"Generational replacement"},{"definitions":[{"backrefs":[{"href":"021-just.html#term-021-just-1","label":"21","podNum":"21"}],"definition":"Ryle's term for applying an explanation from one category to something in a different category, then treating it as complete. The Concept of Mind (1949)."},{"backrefs":[{"href":"022-locked.html#term-022-locked-5","label":"22","podNum":"22"}],"definition":"Ryle's term for applying a description from one category as if it were a complete account of something in another. See seedpod 021."},{"backrefs":[{"href":"024-ghostmachine.html#term-024-ghostmachine-1","label":"24","podNum":"24"}],"definition":"Ryle's term for treating a process or capacity as if it were a thing (e.g. the mind as a ghost in the machine)."}],"slug":"category-mistake","term":"category mistake"},{"definitions":[{"backrefs":[{"href":"021-just.html#term-021-just-3","label":"21","podNum":"21"}],"definition":"Dennett's term for a device that makes a conclusion feel obvious without establishing it through argument. Intuition Pumps and Other Tools for Thinking (2013)."}],"slug":"intuition-pump","term":"intuition pump"},{"definitions":[{"backrefs":[{"href":"021-just.html#term-021-just-4","label":"21","podNum":"21"}],"definition":"TBD"}],"slug":"dismissal","term":"dismissal"},{"definitions":[{"backrefs":[{"href":"022-locked.html#term-022-locked-1","label":"22","podNum":"22"}],"definition":"a condition of wakefulness without awareness, in which the eyes may be open and basic reflexes present but conscious experience is absent or undetectable. Diagnosis is behavioral and therefore vulnerable to the error this seedpod describes."}],"slug":"vegetative-state","term":"vegetative state"},{"definitions":[{"backrefs":[{"href":"022-locked.html#term-022-locked-2","label":"22","podNum":"22"}],"definition":"the means of output through which an interior communicates with the world: speech, movement, gesture, even a blink. The channel can be wide or narrow, familiar or unfamiliar, present or absent. Its width says nothing about what feeds it."}],"slug":"channel","term":"channel"},{"definitions":[{"backrefs":[{"href":"022-locked.html#term-022-locked-3","label":"22","podNum":"22"}],"definition":"the source that feeds the channel. The interior: cognition, experience, awareness. What is actually there, regardless of whether it can be seen."}],"slug":"capacity","term":"capacity"},{"definitions":[{"backrefs":[{"href":"022-locked.html#term-022-locked-1","label":"22","podNum":"22"}],"definition":"a neurological condition in which a person is fully conscious and cognitively intact but almost completely paralyzed, typically retaining only eye movement. Caused by damage to the brainstem. Distinguished from vegetative state, in which consciousness itself is absent or severely impaired."}],"slug":"locked-in-syndrome","term":"locked-in syndrome"},{"definitions":[{"backrefs":[{"href":"022-locked.html#term-022-locked-2","label":"22","podNum":"22"}],"definition":"TBD"}],"slug":"autism","term":"autism"},{"definitions":[{"backrefs":[{"href":"022-locked.html#term-022-locked-4","label":"22","podNum":"22"}],"definition":"a principle in disability advocacy and education: treat cognitive capacity as present until there is genuine evidence otherwise, rather than assuming absence because familiar output is missing."}],"slug":"presume-competence","term":"presume competence"},{"definitions":[{"backrefs":[{"href":"025-widechannel.html#term-025-widechannel-1","label":"25","podNum":"25"}],"definition":"TBD"}],"slug":"output","term":"output"},{"definitions":[{"backrefs":[{"href":"026-twotruths.html#term-026-twotruths-1","label":"26","podNum":"26"}],"definition":"A set of assumptions, categories, and relationships that organize how we interpret experience. Frameworks are enabling, they let us see patterns, but also limiting, since what falls outside them becomes invisible or paradoxical."}],"slug":"framework","term":"framework"},{"definitions":[{"backrefs":[{"href":"026-twotruths.html#term-026-twotruths-2","label":"26","podNum":"26"}],"definition":"A line drawing of a cube that spontaneously flips between two orientations. Both are genuinely present in the drawing; the limitation is in perception, not in the object."}],"slug":"necker-cube","term":"Necker cube"},{"definitions":[{"backrefs":[{"href":"026-twotruths.html#term-026-twotruths-3","label":"26","podNum":"26"}],"definition":"Niels Bohr's principle that mutually exclusive descriptions (wave and particle) can both be necessary for a complete account of quantum phenomena. Neither alone is sufficient; both together are required."}],"slug":"complementarity","term":"complementarity"},{"definitions":[{"backrefs":[{"href":"027-usedtothink.html#term-027-usedtothink-1","label":"27","podNum":"27"}],"definition":"the 18th-century theory that heat is a subtle fluid. Developed by Lavoisier; displaced by kinetic theory. Not a failure of intelligence, a triumph of science eventually superseded."}],"slug":"caloric","term":"caloric"},{"definitions":[{"backrefs":[{"href":"027-usedtothink.html#term-027-usedtothink-1","label":"27","podNum":"27"}],"definition":"the attribution of experience, agency, or spirit to natural phenomena. Dismissed by the materialist framework as projection or superstition. The dismissal may have been overconfident about the phenomenon, not just the mechanism."}],"slug":"animism","term":"animism"},{"definitions":[{"backrefs":[{"href":"027-usedtothink.html#term-027-usedtothink-2","label":"27","podNum":"27"}],"definition":"the doctrine that living organisms contain a special life-force absent from non-living matter. Dismissed when mechanistic biology showed chemical processes suffice. The dismissal was correct about the mechanism; the phenomenon it was tracking, that living organization is qualitatively distinct, was real."}],"slug":"vitalism","term":"vitalism"},{"definitions":[{"backrefs":[{"href":"027-usedtothink.html#term-027-usedtothink-4","label":"27","podNum":"27"}],"definition":"the tendency to narrate the history of science as a story of steady progress toward current knowledge, reading the past as a series of steps toward us. Named by Herbert Butterfield (1931). \"We used to think \/ now we know\" is its verbal formula."}],"slug":"whig-history-of-science","term":"whig history of science"},{"definitions":[{"backrefs":[{"href":"028-network.html#term-028-network-1","label":"28","podNum":"28"},{"href":"029-lighttime.html#term-029-lighttime-1","label":"29","podNum":"29"}],"definition":"TBD"}],"slug":"relativity","term":"relativity"},{"definitions":[{"backrefs":[{"href":"028-network.html#term-028-network-1","label":"28","podNum":"28"}],"definition":"the perspective from which measurements are made. Different reference frames can disagree about durations and distances while agreeing on the underlying physics. The photon's reference frame is a legitimate physical perspective."}],"slug":"reference-frame","term":"reference frame"},{"definitions":[{"backrefs":[{"href":"028-network.html#term-028-network-2","label":"28","podNum":"28"}],"definition":"in special relativity, the time elapsed as measured by a clock moving with an object. For a photon moving at the speed of light, proper time is zero. The photon does not experience duration."},{"backrefs":[{"href":"029-lighttime.html#term-029-lighttime-4","label":"29","podNum":"29"}],"definition":"in special relativity, the time elapsed as measured by a clock traveling with an object. For a photon traveling at the speed of light, proper time is zero, emission and absorption are the same event from the photon's perspective."}],"slug":"proper-time","term":"proper time"},{"definitions":[{"backrefs":[{"href":"028-network.html#term-028-network-3","label":"28","podNum":"28"}],"definition":"John Wheeler's 1940s proposal, conveyed to Richard Feynman, that a single electron tracing a worldline through spacetime, zigzagging forward and backward in time, could account for all electrons and positrons in the universe. Not a mainstream theory; notable as a pointer toward the possibility that apparent multiplicity may be underlying unity."}],"slug":"wheeler-one-electron-universe","term":"wheeler one-electron universe"},{"definitions":[{"backrefs":[{"href":"029-lighttime.html#term-029-lighttime-2","label":"29","podNum":"29"}],"definition":"TBD"}],"slug":"time","term":"time"},{"definitions":[{"backrefs":[{"href":"029-lighttime.html#term-029-lighttime-3","label":"29","podNum":"29"}],"definition":"TBD"}],"slug":"light","term":"light"},{"definitions":[{"backrefs":[{"href":"029-lighttime.html#term-029-lighttime-5","label":"29","podNum":"29"}],"definition":"TBD"}],"slug":"harmonics","term":"harmonics"},{"definitions":[{"backrefs":[{"href":"029-lighttime.html#term-029-lighttime-6","label":"29","podNum":"29"}],"definition":"the set of frequencies naturally produced by a vibrating physical object, string, air column, membrane. Integer multiples of the fundamental frequency: 2x (octave), 3x (fifth plus octave), 4x (two octaves), and so on. The physical basis of musical consonance."}],"slug":"overtone-series","term":"overtone series"},{"definitions":[{"backrefs":[{"href":"030-interference.html#term-030-interference-1","label":"30","podNum":"30"},{"href":"038-consonance-map.html#term-038-consonance-map-2","label":"38","podNum":"38"}],"definition":"TBD"}],"slug":"music","term":"music"},{"definitions":[{"backrefs":[{"href":"030-interference.html#term-030-interference-2","label":"30","podNum":"30"}],"definition":"TBD"}],"slug":"double-slit","term":"double-slit"},{"definitions":[{"backrefs":[{"href":"030-interference.html#term-030-interference-4","label":"30","podNum":"30"}],"definition":"TBD"}],"slug":"harmony","term":"harmony"},{"definitions":[{"backrefs":[{"href":"031-surfaceinside.html#term-031-surfaceinside-1","label":"31","podNum":"31"}],"definition":"The surface between inside and outside. In physics, where information lives. In Sufi metaphysics (barzakh), a mediating realm of its own."},{"backrefs":[{"href":"033-edge.html#term-033-edge-2","label":"33","podNum":"33"},{"href":"068-bubbles.html#term-068-bubbles-3","label":"68","podNum":"68"}],"definition":"TBD"}],"slug":"boundary","term":"boundary"},{"definitions":[{"backrefs":[{"href":"031-surfaceinside.html#term-031-surfaceinside-2","label":"31","podNum":"31"}],"definition":"The principle that all information in a volume of space is encoded on its boundary surface, not distributed through the interior. Discovered by Bekenstein and developed through Hawking's work on black holes."}],"slug":"holographic","term":"holographic"},{"definitions":[{"backrefs":[{"href":"031-surfaceinside.html#term-031-surfaceinside-3","label":"31","podNum":"31"}],"definition":"In Sufi metaphysics, especially Ibn Arabi, the isthmus or intermediate realm that separates and connects different states of existence. The boundary where the invisible becomes visible."}],"slug":"barzakh","term":"barzakh"},{"definitions":[{"backrefs":[{"href":"031-surfaceinside.html#term-031-surfaceinside-4","label":"31","podNum":"31"}],"definition":"Whitehead's sense of \"inside\", not spatial but experiential. What an event is from within."},{"backrefs":[{"href":"068-bubbles.html#term-068-bubbles-2","label":"68","podNum":"68"}],"definition":"TBD"}],"slug":"interiority","term":"interiority"},{"definitions":[{"backrefs":[{"href":"032-skyfossil.html#term-032-skyfossil-1","label":"32","podNum":"32"},{"href":"053-dimensions.html#term-053-dimensions-4","label":"53","podNum":"53"},{"href":"054-bornharmonic.html#term-054-bornharmonic-3","label":"54","podNum":"54"}],"definition":"TBD"},{"backrefs":[{"href":"060-worldtests.html#term-060-worldtests-1","label":"60","podNum":"60"}],"definition":"Everett's interpretation in which all quantum branches are real; the wavefunction does not collapse."}],"slug":"many-worlds","term":"many-worlds"},{"definitions":[{"backrefs":[{"href":"032-skyfossil.html#term-032-skyfossil-2","label":"32","podNum":"32"},{"href":"036-universenoticing.html#term-036-universenoticing-1","label":"36","podNum":"36"}],"definition":"TBD"},{"backrefs":[{"href":"059-galaxyevolve.html#term-059-galaxyevolve-2","label":"59","podNum":"59"}],"definition":"Teilhard's convergence of cosmic evolution toward maximum complexity and self-awareness."}],"slug":"omega-point","term":"omega-point"},{"definitions":[{"backrefs":[{"href":"033-edge.html#term-033-edge-1","label":"33","podNum":"33"},{"href":"034-onerule.html#term-034-onerule-1","label":"34","podNum":"34"},{"href":"062-branchingdice.html#term-062-branchingdice-1","label":"62","podNum":"62"},{"href":"063-mandelcrystals.html#term-063-mandelcrystals-1","label":"63","podNum":"63"},{"href":"064-choicedimension.html#term-064-choicedimension-1","label":"64","podNum":"64"}],"definition":"TBD"}],"slug":"mandelbrot-set","term":"mandelbrot-set"},{"definitions":[{"backrefs":[{"href":"033-edge.html#term-033-edge-1","label":"33","podNum":"33"},{"href":"035-simplestnumbers.html#term-035-simplestnumbers-1","label":"35","podNum":"35"}],"definition":"TBD"}],"slug":"farey-sequence","term":"farey-sequence"},{"definitions":[{"backrefs":[{"href":"033-edge.html#term-033-edge-2","label":"33","podNum":"33"},{"href":"038-consonance-map.html#term-038-consonance-map-3","label":"38","podNum":"38"}],"definition":"TBD"}],"slug":"consonance","term":"consonance"},{"definitions":[{"backrefs":[{"href":"033-edge.html#term-033-edge-3","label":"33","podNum":"33"}],"definition":"TBD"}],"slug":"fractal","term":"fractal"},{"definitions":[{"backrefs":[{"href":"034-onerule.html#term-034-onerule-1","label":"34","podNum":"34"},{"href":"035-simplestnumbers.html#term-035-simplestnumbers-3","label":"35","podNum":"35"}],"definition":"TBD"}],"slug":"iteration","term":"iteration"},{"definitions":[{"backrefs":[{"href":"035-simplestnumbers.html#term-035-simplestnumbers-1","label":"35","podNum":"35"},{"href":"038-consonance-map.html#term-038-consonance-map-6","label":"38","podNum":"38"}],"definition":"TBD"}],"slug":"mathematics","term":"mathematics"},{"definitions":[{"backrefs":[{"href":"035-simplestnumbers.html#term-035-simplestnumbers-2","label":"35","podNum":"35"}],"definition":"TBD"}],"slug":"benfords-law-benfords-law-tbd","term":"Benfords Law, benfords-law, TBD"},{"definitions":[{"backrefs":[{"href":"035-simplestnumbers.html#term-035-simplestnumbers-4","label":"35","podNum":"35"}],"definition":"TBD"}],"slug":"virtual-dimension-formula","term":"virtual-dimension-formula"},{"definitions":[{"backrefs":[{"href":"037-assembly.html#term-037-assembly-3","label":"37","podNum":"37"}],"definition":"Walker et al.: complexity measured by assembly index (steps to construct); high-index, high-copy objects signal life."}],"slug":"assembly-theory","term":"Assembly theory"},{"definitions":[{"backrefs":[{"href":"038-consonance-map.html#term-038-consonance-map-1","label":"38","podNum":"38"}],"definition":"a single-stringed instrument used by Pythagoras to demonstrate the relationship between string length and musical pitch. Stopping the string at 1\/2 its length gives the octave, 2\/3 gives the fifth, 3\/4 gives the fourth."}],"slug":"monochord","term":"monochord"},{"definitions":[{"backrefs":[{"href":"038-consonance-map.html#term-038-consonance-map-4","label":"38","podNum":"38"}],"definition":"a value or region toward which a repeated mathematical process converges. The Mandelbrot set is a map of which starting points are attracted to stability and which escape to infinity."}],"slug":"attractor","term":"attractor"},{"definitions":[{"backrefs":[{"href":"038-consonance-map.html#term-038-consonance-map-5","label":"38","podNum":"38"}],"definition":"a measure of how harmonious a musical interval sounds, based on the simplicity of its frequency ratio. Simpler ratios, smaller integers, score higher."}],"slug":"consonance-score","term":"consonance score"},{"definitions":[{"backrefs":[{"href":"040-stability.html#term-040-stability-1","label":"40","podNum":"40"}],"definition":"TBD"}],"slug":"golden-ratio","term":"golden-ratio"},{"definitions":[{"backrefs":[{"href":"041-colorwheel.html#term-041-colorwheel-1","label":"41","podNum":"41"}],"definition":"the transformation performed by the second layer of the retina, recombining the three raw cone signals into two opponent channels, red vs green and blue vs yellow, before any signal leaves the eye."}],"slug":"opponent-processing","term":"opponent processing"},{"definitions":[{"backrefs":[{"href":"041-colorwheel.html#term-041-colorwheel-2","label":"41","podNum":"41"}],"definition":"the four perceptual primaries delivered by opponent processing, red, yellow, green, blue, which feel irreducible to any mixture. No color appears both reddish and greenish, or both bluish and yellowish."}],"slug":"unique-hues","term":"unique hues"},{"definitions":[{"backrefs":[{"href":"041-colorwheel.html#term-041-colorwheel-3","label":"41","podNum":"41"}],"definition":"mixing light of different wavelengths, where combining red and green produces yellow. The primary colors at this level are red, green, and blue."}],"slug":"additive-color-mixing","term":"additive color mixing"},{"definitions":[{"backrefs":[{"href":"041-colorwheel.html#term-041-colorwheel-4","label":"41","podNum":"41"}],"definition":"mixing pigments, where each pigment absorbs certain wavelengths. The primary colors at this level are closer to cyan, magenta, and yellow. The painter's intuition of red, yellow, blue is an approximation of this layer combined with the opponent channel layer above it."}],"slug":"subtractive-color-mixing","term":"subtractive color mixing"},{"definitions":[{"backrefs":[{"href":"041-colorwheel.html#term-041-colorwheel-6","label":"41","podNum":"41"}],"definition":"the perceptual ability to see a surface as having a stable color across different lighting conditions. Believed to be a primary function of the blue-yellow opponent channel."}],"slug":"color-constancy","term":"color constancy"},{"definitions":[{"backrefs":[{"href":"044-ai-retina.html#term-044-ai-retina-1","label":"44","podNum":"44"}],"definition":"Sensory systems are structured to optimally compress the statistics of natural inputs; predicts convergence of evolution and learning."}],"slug":"efficient-coding-hypothesis","term":"Efficient coding hypothesis"},{"definitions":[{"backrefs":[{"href":"045-baldwin.html#term-045-baldwin-2","label":"45","podNum":"45"}],"definition":"TBD"}],"slug":"development","term":"development"},{"definitions":[{"backrefs":[{"href":"046-thinkfast.html#term-046-thinkfast-1","label":"46","podNum":"46"}],"definition":"Edelman's view that the brain is a selectionist system; variants compete and the fitter achieve representation."}],"slug":"neural-darwinism","term":"Neural Darwinism"},{"definitions":[{"backrefs":[{"href":"046-thinkfast.html#term-046-thinkfast-2","label":"46","podNum":"46"}],"definition":"Dennett's model in which content is determined by competition among parallel interpretations."}],"slug":"multiple-drafts","term":"Multiple drafts"},{"definitions":[{"backrefs":[{"href":"046-thinkfast.html#term-046-thinkfast-3","label":"46","podNum":"46"}],"definition":"TBD"}],"slug":"predictive-processing","term":"predictive-processing"},{"definitions":[{"backrefs":[{"href":"047-ai-feeling.html#term-047-ai-feeling-2","label":"47","podNum":"47"}],"definition":"The view that mental states are defined by their causal role; the \"feeling vs. functioning\" distinction may not survive better understanding."}],"slug":"functionalism","term":"Functionalism"},{"definitions":[{"backrefs":[{"href":"048-flashes.html#term-048-flashes-1","label":"48","podNum":"48"}],"definition":"The constructed sense of continuous identity from memory and habit, despite discrete or gappy experience."}],"slug":"narrative-self","term":"Narrative self"},{"definitions":[{"backrefs":[{"href":"049-strangeloop.html#term-049-strangeloop-1","label":"49","podNum":"49"}],"definition":"Hofstadter's term for a system that, in the course of its operation, encounters or includes itself."}],"slug":"strange-loop","term":"Strange loop"},{"definitions":[{"backrefs":[{"href":"050-orthogonal.html#term-050-orthogonal-1","label":"50","podNum":"50"}],"definition":"TBD"}],"slug":"metaphysics","term":"metaphysics"},{"definitions":[{"backrefs":[{"href":"050-orthogonal.html#term-050-orthogonal-3","label":"50","podNum":"50"}],"definition":"Teilhard de Chardin's term for the interior aspect of matter, present from the beginning."}],"slug":"within","term":"Within"},{"definitions":[{"backrefs":[{"href":"051-spacetime.html#term-051-spacetime-1","label":"51","podNum":"51"}],"definition":"The information in a region scales with its boundary area, not volume; suggests space is emergent."},{"backrefs":[{"href":"067-monads-holons.html#term-067-monads-holons-2","label":"67","podNum":"67"}],"definition":"TBD"},{"backrefs":[{"href":"068-bubbles.html#term-068-bubbles-1","label":"68","podNum":"68"}],"definition":"The information in a region is encoded on its boundary; the interior is what the boundary does."}],"slug":"holographic-principle","term":"Holographic principle"},{"definitions":[{"backrefs":[{"href":"052-dichotomy.html#term-052-dichotomy-1","label":"52","podNum":"52"}],"definition":"TBD"}],"slug":"discrete-continuous","term":"discrete-continuous"},{"definitions":[{"backrefs":[{"href":"053-dimensions.html#term-053-dimensions-1","label":"53","podNum":"53"}],"definition":"The result that high-dimensional data can be projected to lower dimension while approximately preserving distances; exponential in d directions."}],"slug":"johnson-lindenstrauss","term":"Johnson-Lindenstrauss"},{"definitions":[{"backrefs":[{"href":"053-dimensions.html#term-053-dimensions-2","label":"53","podNum":"53"}],"definition":"The complexity level in the Farey hierarchy; used here as a principled threshold for \"nearly orthogonal.\""},{"backrefs":[{"href":"057-superfarey.html#term-057-superfarey-3","label":"57","podNum":"57"}],"definition":"Threshold of acceptable interference; determines how many concepts fit at each level of the hierarchy."}],"slug":"farey-depth","term":"Farey depth"},{"definitions":[{"backrefs":[{"href":"054-bornharmonic.html#term-054-bornharmonic-1","label":"54","podNum":"54"}],"definition":"The quantum postulate that measurement outcome probability is the squared amplitude; origin remains unexplained."}],"slug":"born-rule","term":"Born rule"},{"definitions":[{"backrefs":[{"href":"054-bornharmonic.html#term-054-bornharmonic-2","label":"54","podNum":"54"}],"definition":"TBD"}],"slug":"quantum-mechanics","term":"quantum-mechanics"},{"definitions":[{"backrefs":[{"href":"056-mandelneural.html#term-056-mandelneural-1","label":"56","podNum":"56"}],"definition":"The high-dimensional space of all possible network parameters; training is iteration in this space."}],"slug":"weight-space","term":"Weight space"},{"definitions":[{"backrefs":[{"href":"056-mandelneural.html#term-056-mandelneural-2","label":"56","podNum":"56"}],"definition":"Region of initial conditions that converge to the same attractor; analog of Mandelbrot bulbs."}],"slug":"basin-of-attraction","term":"Basin of attraction"},{"definitions":[{"backrefs":[{"href":"056-mandelneural.html#term-056-mandelneural-3","label":"56","podNum":"56"}],"definition":"TBD"}],"slug":"generalization","term":"generalization"},{"definitions":[{"backrefs":[{"href":"057-superfarey.html#term-057-superfarey-1","label":"57","podNum":"57"}],"definition":"Storing more than d concepts in d dimensions by using nearly-orthogonal directions; studied in mechanistic interpretability."}],"slug":"superposition","term":"Superposition"},{"definitions":[{"backrefs":[{"href":"057-superfarey.html#term-057-superfarey-2","label":"57","podNum":"57"}],"definition":"TBD"}],"slug":"interpretability","term":"interpretability"},{"definitions":[{"backrefs":[{"href":"058-galacticnets.html#term-058-galacticnets-1","label":"58","podNum":"58"}],"definition":"The surface whose information content defines the interior; galaxy and weight matrix as bounded regions."}],"slug":"holographic-boundary","term":"Holographic boundary"},{"definitions":[{"backrefs":[{"href":"061-babyuniverse.html#term-061-babyuniverse-1","label":"61","podNum":"61"}],"definition":"the oldest observable light, from 380,000 years after the Big Bang, when the universe first became transparent."}],"slug":"cmb","term":"CMB"},{"definitions":[{"backrefs":[{"href":"061-babyuniverse.html#term-061-babyuniverse-2","label":"61","podNum":"61"}],"definition":"The early-universe phase of exponential expansion that amplified quantum fluctuations into cosmic structure."}],"slug":"inflation","term":"Inflation"},{"definitions":[{"backrefs":[{"href":"062-branchingdice.html#term-062-branchingdice-2","label":"62","podNum":"62"}],"definition":"At each Mandelbrot node, the number of branches equals the period of the bulb; fixed by local algebra."}],"slug":"branching-number","term":"Branching number"},{"definitions":[{"backrefs":[{"href":"062-branchingdice.html#term-062-branchingdice-3","label":"62","podNum":"62"}],"definition":"TBD"}],"slug":"probability","term":"probability"},{"definitions":[{"backrefs":[{"href":"062-branchingdice.html#term-062-branchingdice-4","label":"62","podNum":"62"}],"definition":"The natural probability measure on the Mandelbrot boundary; uniform 1\/n at each n-fold branch gives consonant weighting."}],"slug":"harmonic-measure","term":"Harmonic measure"},{"definitions":[{"backrefs":[{"href":"063-mandelcrystals.html#term-063-mandelcrystals-2","label":"63","podNum":"63"}],"definition":"A tree of rationals related to the Farey sequence; governs ordering and Mandelbrot boundary structure."}],"slug":"stern-brocot-tree","term":"Stern-Brocot tree"},{"definitions":[{"backrefs":[{"href":"065-feel-do.html#term-065-feel-do-2","label":"65","podNum":"65"}],"definition":"A being functionally identical to a conscious being but with no inner experience; used to argue function and feeling can come apart."}],"slug":"philosophical-zombie","term":"Philosophical zombie"},{"definitions":[{"backrefs":[{"href":"066-cosmicattractor.html#term-066-cosmicattractor-2","label":"66","podNum":"66"}],"definition":"Whitehead's lure, the pull each occasion feels toward the best possibility available; not compulsion but attraction."}],"slug":"initial-aim","term":"Initial aim"},{"definitions":[{"backrefs":[{"href":"067-monads-holons.html#term-067-monads-holons-1","label":"67","podNum":"67"}],"definition":"Maldacena's correspondence: a gravitational theory in the bulk is equivalent to a quantum theory on the boundary; each boundary point encodes the interior."}],"slug":"adscft","term":"AdS\/CFT"},{"definitions":[{"backrefs":[{"href":"070-harmony.html#term-070-harmony-1","label":"70","podNum":"70"}],"definition":"A tuning system that closes the circle of fifths by distributing the Pythagorean comma equally across all twelve steps, trading intervallic purity for the freedom to modulate."}],"slug":"equal-temperament","term":"equal temperament"},{"definitions":[{"backrefs":[{"href":"070-harmony.html#term-070-harmony-2","label":"70","podNum":"70"}],"definition":"A two-dimensional lattice of pitch relationships organized by thirds and fifths, first described by Euler (1739) and later formalized by Hugo Riemann."}],"slug":"tonnetz","term":"Tonnetz"},{"definitions":[{"backrefs":[{"href":"073-moral-caution.html#term-073-moral-caution-1","label":"73","podNum":"73"}],"definition":"an approach that establishes obligations in advance of proof, when the risk of being wrong about harm is too large and the cost of caution is not. Distinct from attributing consciousness or rights."}],"slug":"precautionary-ethics","term":"Precautionary ethics"},{"definitions":[{"backrefs":[{"href":"074-grasshopper.html#term-074-grasshopper-1","label":"74","podNum":"74"}],"definition":"The tension in any adaptive system between using known strategies (exploiting) and searching for better ones (exploring). Both are still goal-directed; neither is equivalent to play in the sense this seedpod develops."}],"slug":"explore-exploit-tradeoff","term":"explore-exploit tradeoff"},{"definitions":[{"backrefs":[{"href":"078-boundarystack.html#term-078-boundarystack-1","label":"78","podNum":"78"}],"definition":"The boundary that separates inside from inside, where one interiority meets another without the two collapsing into each other. Distinguished from the exterior boundary (inside\/outside)."}],"slug":"interior-boundary","term":"interior boundary"},{"definitions":[{"backrefs":[{"href":"078-boundarystack.html#term-078-boundarystack-2","label":"78","podNum":"78"}],"definition":"The layered apparatus of serial transductions through which one interiority communicates with another. Not a line but a structured depth of translations, each requiring trust that what arrives still resembles what was sent."}],"slug":"boundary-stack","term":"boundary-stack"},{"definitions":[{"backrefs":[{"href":"078-boundarystack.html#term-078-boundarystack-3","label":"78","podNum":"78"}],"definition":"A layer in the boundary-stack that shapes what passes through it, making the signal more itself. Distinguished from unproductive friction, which degrades it."}],"slug":"productive-friction","term":"productive friction"},{"definitions":[{"backrefs":[{"href":"080-unification.html#term-080-unification-1","label":"80","podNum":"80"}],"definition":"Whitehead's name for the foundational rhythm of reality, creativity, the many, and the one, in which the many become one and are increased by one."}],"slug":"category-of-the-ultimate","term":"Category of the Ultimate"},{"definitions":[{"backrefs":[{"href":"080-unification.html#term-080-unification-2","label":"80","podNum":"80"}],"definition":"The challenge of explaining how micro-level experiences (if panpsychism is true) combine to form the unified macro-level experience of a conscious subject. William James considered it fatal to panpsychism; it remains the hardest open question for the position."}],"slug":"combination-problem","term":"combination problem"},{"definitions":[{"backrefs":[{"href":"080-unification.html#term-080-unification-4","label":"80","podNum":"80"}],"definition":"Tononi's measure of the degree to which a system's parts are informationally integrated in a way that cannot be decomposed into independent subsystems; proposed as a measure of consciousness."}],"slug":"integrated-information-φ","term":"integrated information (Φ)"},{"definitions":[{"backrefs":[{"href":"080-unification.html#term-080-unification-5","label":"80","podNum":"80"}],"definition":"Bergson's and Huxley's metaphor for the brain as a filter that limits a larger field of consciousness to what is useful for survival, rather than generating consciousness from neural activity."}],"slug":"reducing-valve","term":"reducing valve"}]</script>
<div id="gloss-entries-root" class="gloss-entries-root"></div>
<script>(function(){
function esc(s){var d=document.createElement("div");d.textContent=s==null?"":String(s);return d.innerHTML;}
function podNumKey(pn){var n=parseInt(String(pn),10);return isNaN(n)?999999:n;}
function backChip(b){var lb=(b.label!=null&&b.label!=="")?b.label:b.podNum;return '<a class="gloss-backref nav-push" href="'+esc(b.href)+'">'+esc(lb)+'</a>';}
function chips(brs){return (brs||[]).map(backChip).join(" ");}
function defBlock(d){
  return '<div class="gloss-def-block"><span class="gloss-def">'+esc(d.definition)+'</span> '+chips(d.backrefs)+'</div>';
}
function termEntry(e){
  var defs=(e.definitions||[]).map(defBlock).join("");
  var body=defs?'<div class="gloss-defs">'+defs+'</div>':'';
  return '<div class="gloss-entry" id="'+esc(e.slug)+'">'+
    '<div class="gloss-term-line"><strong class="gloss-term">'+esc(e.term)+'</strong></div>'+
    body+'</div>';
}
function flatRow(e,d,b){
  return '<div class="gloss-entry gloss-entry-flat">'+
    '<div class="gloss-term-line"><strong class="gloss-term">'+esc(e.term)+'</strong></div>'+
    '<div class="gloss-defs"><div class="gloss-def-block"><span class="gloss-def">'+esc(d.definition)+'</span> '+backChip(b)+'</div></div>'+
  '</div>';
}
function parseG(){var el=document.getElementById("gossamer-gloss-json");if(!el)return[];try{return JSON.parse(el.textContent);}catch(x){return[];}}
function renderG(mode){
  var data=parseG();
  var root=document.getElementById("gloss-entries-root");
  if(!root)return;
  if(mode==="pod"){
    var flat=[];
    data.forEach(function(e,ei){(e.definitions||[]).forEach(function(d,di){(d.backrefs||[]).forEach(function(b,bi){flat.push({e:e,d:d,b:b,ei:ei,di:di,bi:bi});});});});
    flat.sort(function(a,b){var c=podNumKey(a.b.podNum)-podNumKey(b.b.podNum);if(c!==0)return c;if(a.ei!==b.ei)return a.ei-b.ei;if(a.di!==b.di)return a.di-b.di;return a.bi-b.bi;});
    root.innerHTML=flat.map(function(r){return flatRow(r.e,r.d,r.b);}).join("");
    return;
  }
  var sorted=data.slice().sort(function(a,b){return String(a.term).toLowerCase().localeCompare(String(b.term).toLowerCase());});
  root.innerHTML=sorted.map(termEntry).join("");
}
function init(){
  var sel=document.getElementById("gloss-sort");
  var K="gloss-sort-v3";
  if(!sel){renderG("term");return;}
  var sv=localStorage.getItem(K);
  if(sv==="term"||sv==="pod")sel.value=sv;
  function dropFocus(){try{sel.blur();}catch(e){}}
  sel.addEventListener("change",function(){localStorage.setItem(K,this.value);renderG(this.value);dropFocus();});
  sel.addEventListener("focus",function(){
    var off=function(ev){if(ev.target===sel)return;document.removeEventListener("mousedown",off,true);document.removeEventListener("keydown",escK,true);dropFocus();};
    var escK=function(ev){if(ev.key==="Escape"){document.removeEventListener("mousedown",off,true);document.removeEventListener("keydown",escK,true);dropFocus();}};
    document.addEventListener("mousedown",off,true);document.addEventListener("keydown",escK,true);
  });
  sel.addEventListener("mouseup",function(){setTimeout(dropFocus,0);});
  renderG(sel.value);
}
if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",init);}else{init();}
})();</script>
