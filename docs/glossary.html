<div class="wrap"><div class="page-body home-page fade"><h1>Glossary</h1>
<p>Key terms from all seedpods.</p>
<div class="gloss-sort-section">
<p class="repo-sort-wrap"><label for="gloss-sort">Sort: </label><select id="gloss-sort" class="repo-sort" aria-label="Sort glossary"><option value="term" selected>By term</option><option value="pod">By article</option></select></p>
<script type="application/json" id="gossamer-gloss-json">[{"definition":"As used in this archive: one of seven provisional groupings used to give readers initial orientation. Not intended as a formal taxonomy. Seedpods often belong to more than one and are assigned by primary hook.","podHtml":"000-map.html","podNum":"0","slug":"category","term":"category"},{"definition":"TBD","podHtml":"001-caloric.html","podNum":"1","slug":"history-of-science","term":"history-of-science"},{"definition":"TBD","podHtml":"001-caloric.html","podNum":"1","slug":"consciousness","term":"consciousness"},{"definition":"TBD","podHtml":"001-caloric.html","podNum":"1","slug":"ai","term":"AI"},{"definition":"Thomas Kuhn's term for the revolutionary replacement of one scientific framework by another, as distinct from normal cumulative progress. From The Structure of Scientific Revolutions (1962, University of Chicago Press).","podHtml":"001-caloric.html","podNum":"1","slug":"paradigm-shift","term":"Paradigm shift"},{"definition":"Whitehead's term for the error of mistaking a useful abstraction for the underlying concrete reality. Appears throughout Process and Reality (1929).","podHtml":"001-caloric.html","podNum":"1","slug":"fallacy-of-misplaced-concreteness","term":"Fallacy of misplaced concreteness"},{"definition":"philosopher David Chalmers' term for the question of why physical processes give rise to subjective experience at all. From Facing Up to the Problem of Consciousness, Journal of Consciousness Studies (1995).","podHtml":"001-caloric.html","podNum":"1","slug":"the-hard-problem-of-consciousness","term":"The hard problem of consciousness"},{"definition":"attributed to Max Planck. A version appears in his Scientific Autobiography (1949): \"A new scientific truth does not triumph by convincing its opponents and making them see the light, but rather because its opponents eventually die and a new generation grows up that is familiar with it.\"","podHtml":"001-caloric.html","podNum":"1","slug":"science-advances-one-funeral-at-a-time","term":"Science advances one funeral at a time"},{"definition":"TBD","podHtml":"002-events.html","podNum":"2","slug":"ontology","term":"ontology"},{"definition":"TBD","podHtml":"002-events.html","podNum":"2","slug":"process-philosophy","term":"process-philosophy"},{"definition":"Alfred North Whitehead's term for the error of treating an abstraction as if it were the concrete reality. The paradigm case: treating the particle — a scientific abstraction useful for calculation — as the fundamental unit of nature, while forgetting that it was abstracted from the concrete flow of events.","podHtml":"002-events.html","podNum":"2","slug":"fallacy-of-misplaced-concreteness","term":"Fallacy of misplaced concreteness"},{"definition":"Whitehead's term for the fundamental unit of reality: a discrete event of becoming. Enduring objects are families (Whitehead: \"societies\") of actual occasions whose pattern is stable enough to appear permanent. The occasion is primary; the object is derivative.","podHtml":"002-events.html","podNum":"2","slug":"actual-occasion","term":"Actual occasion"},{"definition":"in quantum field theory, the fundamental entities are fields that pervade space. Particles are localized excitations of these fields, brought into being by interactions and resolved by others. The field is ontologically primary; the particle is a derived event.","podHtml":"002-events.html","podNum":"2","slug":"quantum-field","term":"Quantum field"},{"definition":"Wittgenstein's term for the way members of a category (chairs, games, languages) share overlapping similarities without any single feature common to all. The category is held together by a web of resemblances, not by a shared essence.","podHtml":"002-events.html","podNum":"2","slug":"family-resemblance","term":"Family resemblance"},{"definition":"Carlo Rovelli's interpretation of quantum mechanics, in which quantum states are relative to observers or measuring systems rather than absolute. Properties do not exist independently of interactions.","podHtml":"002-events.html","podNum":"2","slug":"relational-quantum-mechanics","term":"Relational quantum mechanics"},{"definition":"TBD","podHtml":"003-inside.html","podNum":"3","slug":"experience","term":"experience"},{"definition":"the philosophical position that experience or mind is a fundamental and ubiquitous feature of reality, not a late biological product. Distinguished from animism (which attributes spirits or agency to natural objects) by its grounding in rigorous argument rather than cultural tradition.","podHtml":"003-inside.html","podNum":"3","slug":"panpsychism","term":"Panpsychism"},{"definition":"Alfred North Whitehead's term for the fundamental unit of reality: a discrete event of becoming that takes in its environment, integrates it, and completes itself. Enduring objects are families (Whitehead: \"societies\") of actual occasions stable enough to appear permanent.","podHtml":"003-inside.html","podNum":"3","slug":"actual-occasion","term":"Actual occasion"},{"definition":"David Chalmers' term (1995) for the question of why any physical process gives rise to subjective experience at all. Distinguished from the \"easy problems\" of explaining attention, memory, and behavior — which are hard in practice but tractable in principle. The hard problem is why there is something it is like to be a system at all.","podHtml":"003-inside.html","podNum":"3","slug":"hard-problem-of-consciousness","term":"Hard problem of consciousness"},{"definition":"Whitehead's term for the way each actual occasion takes in and registers what surrounds it before completing itself. Plain English equivalent: feeling, taking-in. The root is the same as \"apprehend.\"","podHtml":"003-inside.html","podNum":"3","slug":"prehension","term":"Prehension"},{"definition":"TBD","podHtml":"004-self.html","podNum":"4","slug":"buddhism","term":"buddhism"},{"definition":"TBD","podHtml":"004-self.html","podNum":"4","slug":"mysticism","term":"mysticism"},{"definition":"TBD","podHtml":"004-self.html","podNum":"4","slug":"identity","term":"identity"},{"definition":"TBD","podHtml":"004-self.html","podNum":"4","slug":"self","term":"self"},{"definition":"Whitehead's fundamental unit of reality — an event that prehends its past, integrates, and perishes into the next.","podHtml":"004-self.html","podNum":"4","slug":"actual-occasion","term":"Actual occasion"},{"definition":"In process philosophy, a persistent pattern of occasions with a common character; the self is a society, not a substance.","podHtml":"004-self.html","podNum":"4","slug":"society","term":"Society"},{"definition":"The Buddhist doctrine of no fixed self; experience arises moment to moment with no underlying owner.","podHtml":"004-self.html","podNum":"4","slug":"anatta","term":"Anatta"},{"definition":"Whitehead's term for the way each moment of experience actively feels and inherits the preceding moment.","podHtml":"004-self.html","podNum":"4","slug":"prehension","term":"Prehension"},{"definition":"TBD","podHtml":"005-freewill.html","podNum":"5","slug":"free-will","term":"free-will"},{"definition":"TBD","podHtml":"005-freewill.html","podNum":"5","slug":"physics","term":"physics"},{"definition":"TBD","podHtml":"005-freewill.html","podNum":"5","slug":"determinism","term":"determinism"},{"definition":"TBD","podHtml":"005-freewill.html","podNum":"5","slug":"creativity","term":"creativity"},{"definition":"Whitehead's term for the irreducible novelty introduced by each occasion as it resolves possibility into actuality.","podHtml":"005-freewill.html","podNum":"5","slug":"creative-advance","term":"Creative advance"},{"definition":"In process philosophy, each occasion's moment of decision that cannot be fully predicted from its past.","podHtml":"005-freewill.html","podNum":"5","slug":"self-determination","term":"Self-determination"},{"definition":"TBD","podHtml":"006-output.html","podNum":"6","slug":"ai","term":"AI"},{"definition":"TBD","podHtml":"006-output.html","podNum":"6","slug":"intelligence","term":"intelligence"},{"definition":"TBD","podHtml":"006-output.html","podNum":"6","slug":"cognition","term":"cognition"},{"definition":"the channel through which a process expresses itself externally. The interface constrains and shapes what can be expressed; it does not determine what is being expressed.","podHtml":"006-output.html","podNum":"6","slug":"output-interface","term":"Output interface"},{"definition":"in Whitehead's sense, the actual unfolding activity of an occasion of experience. Distinct from its products or traces.","podHtml":"006-output.html","podNum":"6","slug":"process","term":"Process"},{"definition":"used here in the broadest sense: any process that selects a next state given a current one. Deliberately spans thermostats and minds.","podHtml":"006-output.html","podNum":"6","slug":"prediction","term":"Prediction"},{"definition":"TBD","podHtml":"007-vacuum.html","podNum":"7","slug":"quantum-mechanics","term":"quantum-mechanics"},{"definition":"TBD","podHtml":"007-vacuum.html","podNum":"7","slug":"fields","term":"fields"},{"definition":"TBD","podHtml":"007-vacuum.html","podNum":"7","slug":"potential","term":"potential"},{"definition":"Whitehead's pure possibilities that occasions select from and realize; the quantum vacuum's virtual states are a physical analogue.","podHtml":"007-vacuum.html","podNum":"7","slug":"eternal-objects","term":"Eternal objects"},{"definition":"The way one occasion takes in or \"feels\" another; the field is the medium through which occasions prehend each other.","podHtml":"007-vacuum.html","podNum":"7","slug":"prehension","term":"Prehension"},{"definition":"In QFT, short-lived excitations of the vacuum that contribute to processes; not \"things\" but possibilities being sampled.","podHtml":"007-vacuum.html","podNum":"7","slug":"virtual-particle","term":"Virtual particle"},{"definition":"TBD","podHtml":"008-fields.html","podNum":"8","slug":"physics","term":"physics"},{"definition":"TBD","podHtml":"008-fields.html","podNum":"8","slug":"fields","term":"fields"},{"definition":"TBD","podHtml":"008-fields.html","podNum":"8","slug":"quantum-mechanics","term":"quantum-mechanics"},{"definition":"TBD","podHtml":"008-fields.html","podNum":"8","slug":"consciousness","term":"consciousness"},{"definition":"TBD","podHtml":"008-fields.html","podNum":"8","slug":"electromagnetism","term":"electromagnetism"},{"definition":"the unified field described by James Clerk Maxwell's equations (1865), of which electricity, magnetism, and light are all aspects. Not a medium that contains these phenomena but the phenomenon itself. Pervades all of space.","podHtml":"008-fields.html","podNum":"8","slug":"electromagnetic-field","term":"Electromagnetic field"},{"definition":"what the electromagnetic field does when a charged particle accelerates. The disturbance propagates outward as light. A stationary charge is silent; only acceleration speaks.","podHtml":"008-fields.html","podNum":"8","slug":"radiation","term":"Radiation"},{"definition":"Alfred North Whitehead's term for the fundamental act by which any event takes in and is shaped by what surrounds it. Not a metaphor for perception but a proposed feature of reality at every scale: each occasion reaches out and feels its environment before it can become itself. Whitehead argued the electromagnetic field is the physical medium through which this reaching occurs.","podHtml":"008-fields.html","podNum":"8","slug":"prehension","term":"Prehension"},{"definition":"the spreading and interference of waves when they pass through a gap or around an obstacle. Visible when light passes through a mesh screen. Evidence that light is a field phenomenon, not a particle traveling a straight path.","podHtml":"008-fields.html","podNum":"8","slug":"diffraction","term":"Diffraction"},{"definition":"TBD","podHtml":"009-randomness.html","podNum":"9","slug":"physics","term":"physics"},{"definition":"TBD","podHtml":"009-randomness.html","podNum":"9","slug":"emergence","term":"emergence"},{"definition":"TBD","podHtml":"009-randomness.html","podNum":"9","slug":"complexity","term":"complexity"},{"definition":"TBD","podHtml":"009-randomness.html","podNum":"9","slug":"evolution","term":"evolution"},{"definition":"TBD","podHtml":"009-randomness.html","podNum":"9","slug":"symmetry-breaking","term":"symmetry-breaking"},{"definition":"the process by which a system in a perfectly symmetric but unstable state falls into an asymmetric lower-energy state through random perturbation, and stays there. The mechanism behind crystal formation, dune building, and the large-scale structure of the universe.","podHtml":"009-randomness.html","podNum":"9","slug":"spontaneous-symmetry-breaking","term":"Spontaneous symmetry breaking"},{"definition":"an optimization technique borrowed from metallurgy that uses controlled randomness to escape local maxima. By occasionally accepting worse solutions, the algorithm avoids getting trapped and finds better global solutions. Used in engineering, chip design, and AI training.","podHtml":"009-randomness.html","podNum":"9","slug":"simulated-annealing","term":"Simulated annealing"},{"definition":"the training algorithm used in neural networks that deliberately injects randomness into each optimization step. Pure deterministic optimization gets trapped in local minima; the randomness keeps the search moving toward better solutions.","podHtml":"009-randomness.html","podNum":"9","slug":"stochastic-gradient-descent","term":"Stochastic gradient descent"},{"definition":"Whitehead's term for the irreducible self-determination at the heart of each actual occasion; the source of genuine newness in the universe that cannot be fully predicted from prior causes.","podHtml":"009-randomness.html","podNum":"9","slug":"creative-advance-into-novelty","term":"Creative advance into novelty"},{"definition":"Whitehead's term for the fundamental unit of reality; a moment of experience that takes in its world, reaches a decision, and completes into the next occasion's inheritance.","podHtml":"009-randomness.html","podNum":"9","slug":"actual-occasion","term":"Actual occasion"},{"definition":"a network of molecules in which each member's production is catalyzed by other members of the set. Stuart Kauffman's demonstration that chemistry at sufficient complexity spontaneously organizes itself without external direction.","podHtml":"009-randomness.html","podNum":"9","slug":"autocatalytic-set","term":"Autocatalytic set"},{"definition":"the property of living systems that continuously produce the very components that sustain them; coined by Maturana and Varela. The cell does not merely use its components — it makes them, circularly, as the condition of its own continued existence.","podHtml":"009-randomness.html","podNum":"9","slug":"autopoiesis","term":"Autopoiesis"},{"definition":"a solution that is better than all its immediate neighbors but not the best solution overall. The trap that pure hill-climbing optimization falls into; escaped by introducing randomness into the search.","podHtml":"009-randomness.html","podNum":"9","slug":"local-maximum","term":"Local maximum"},{"definition":"TBD","podHtml":"010-largenumbers.html","podNum":"10","slug":"mathematics","term":"mathematics"},{"definition":"TBD","podHtml":"010-largenumbers.html","podNum":"10","slug":"godel-numbers","term":"godel-numbers"},{"definition":"TBD","podHtml":"010-largenumbers.html","podNum":"10","slug":"intuition","term":"intuition"},{"definition":"TBD","podHtml":"010-largenumbers.html","podNum":"10","slug":"complexity","term":"complexity"},{"definition":"The result that any consistent formal system of sufficient strength contains true statements it cannot prove; constructed via a number encoding self-reference.","podHtml":"010-largenumbers.html","podNum":"10","slug":"gödels-incompleteness","term":"Gödel's incompleteness"},{"definition":"The appearance of qualitatively new properties or capacities when simpler processes accumulate or nest beyond a threshold.","podHtml":"010-largenumbers.html","podNum":"10","slug":"emergence","term":"Emergence"},{"definition":"TBD","podHtml":"011-moreisdifferent.html","podNum":"11","slug":"emergence","term":"emergence"},{"definition":"TBD","podHtml":"011-moreisdifferent.html","podNum":"11","slug":"complexity","term":"complexity"},{"definition":"TBD","podHtml":"011-moreisdifferent.html","podNum":"11","slug":"holons","term":"holons"},{"definition":"TBD","podHtml":"011-moreisdifferent.html","podNum":"11","slug":"ai","term":"AI"},{"definition":"Arthur Koestler's term for any entity that is simultaneously a whole in its own right and a part of a larger whole. Reality in Koestler's picture is a nested hierarchy of holons rather than parts assembling into wholes.","podHtml":"011-moreisdifferent.html","podNum":"11","slug":"holon","term":"Holon"},{"definition":"Koestler's term for the collision of two independent frames of reference that releases energy as laughter, insight, or aesthetic emotion. His claim: this is the common structure of humor, scientific discovery, and artistic creation.","podHtml":"011-moreisdifferent.html","podNum":"11","slug":"bisociation","term":"Bisociation"},{"definition":"Philip Anderson's phrase (1972) for the principle that each level of complexity has emergent properties that cannot be derived from the level below. Not a violation of lower-level laws, but genuinely new phenomena requiring their own description.","podHtml":"011-moreisdifferent.html","podNum":"11","slug":"more-is-different","term":"More is different"},{"definition":"Whitehead's term for a stable pattern of events organized around a common characteristic that persists through time. Ant colonies, cities, brains, and neural networks are all societies in this sense.","podHtml":"011-moreisdifferent.html","podNum":"11","slug":"society-of-actual-occasions","term":"Society of actual occasions"},{"definition":"TBD","podHtml":"012-autopoiesis.html","podNum":"12","slug":"life","term":"life"},{"definition":"TBD","podHtml":"012-autopoiesis.html","podNum":"12","slug":"cells","term":"cells"},{"definition":"TBD","podHtml":"012-autopoiesis.html","podNum":"12","slug":"maturana-varela","term":"maturana-varela"},{"definition":"TBD","podHtml":"012-autopoiesis.html","podNum":"12","slug":"entropy","term":"entropy"},{"definition":"TBD","podHtml":"012-autopoiesis.html","podNum":"12","slug":"evolution","term":"evolution"},{"definition":"Maturana and Varela's term for a system that continuously produces the very components that constitute and maintain it. The defining organizational property of living systems.","podHtml":"012-autopoiesis.html","podNum":"12","slug":"autopoiesis","term":"autopoiesis"},{"definition":"Whitehead's term for a persistent pattern of actual occasions organized with sufficient coherence and closure to act as a unit through time. The metaphysical counterpart to the autopoietic organization.","podHtml":"012-autopoiesis.html","podNum":"12","slug":"society-of-occasions","term":"society of occasions"},{"definition":"Schrödinger's term for the ordered structure that living systems import from their environment to offset internal disorder. The thermodynamic face of what autopoiesis achieves organizationally.","podHtml":"012-autopoiesis.html","podNum":"12","slug":"negative-entropy","term":"negative entropy"},{"definition":"TBD","podHtml":"013-enactment.html","podNum":"13","slug":"cognition","term":"cognition"},{"definition":"TBD","podHtml":"013-enactment.html","podNum":"13","slug":"perception","term":"perception"},{"definition":"The view that cognition is not representation of a pregiven world but the enactment of a world through embodied action.","podHtml":"013-enactment.html","podNum":"13","slug":"enactivism","term":"Enactivism"},{"definition":"Whitehead's term for how an occasion takes in its context; enactivism describes prehension at the scale of the organism.","podHtml":"013-enactment.html","podNum":"13","slug":"prehension","term":"Prehension"},{"definition":"TBD","podHtml":"014-cities.html","podNum":"14","slug":"consciousness","term":"consciousness"},{"definition":"TBD","podHtml":"014-cities.html","podNum":"14","slug":"emergence","term":"emergence"},{"definition":"TBD","podHtml":"014-cities.html","podNum":"14","slug":"collective-experience","term":"collective-experience"},{"definition":"Whitehead's term for a stable pattern of events with a common character; a city is a society of human occasions.","podHtml":"014-cities.html","podNum":"14","slug":"society-of-occasions","term":"Society of occasions"},{"definition":"TBD","podHtml":"015-aliens.html","podNum":"15","slug":"ai","term":"AI"},{"definition":"TBD","podHtml":"015-aliens.html","podNum":"15","slug":"consciousness","term":"consciousness"},{"definition":"TBD","podHtml":"015-aliens.html","podNum":"15","slug":"intelligence","term":"intelligence"},{"definition":"TBD","podHtml":"015-aliens.html","podNum":"15","slug":"culture","term":"culture"},{"definition":"TBD","podHtml":"016-neuralnetwork.html","podNum":"16","slug":"ai","term":"AI"},{"definition":"TBD","podHtml":"016-neuralnetwork.html","podNum":"16","slug":"neural-networks","term":"neural-networks"},{"definition":"TBD","podHtml":"016-neuralnetwork.html","podNum":"16","slug":"consciousness","term":"consciousness"},{"definition":"TBD","podHtml":"016-neuralnetwork.html","podNum":"16","slug":"fields","term":"fields"},{"definition":"Whitehead's unit of process; each forward pass of a network is an occasion that prehends inputs and completes into output.","podHtml":"016-neuralnetwork.html","podNum":"16","slug":"actual-occasion","term":"Actual occasion"},{"definition":"The way occasions take in their past; the network's \"taking in\" of weights and activations is prehension.","podHtml":"016-neuralnetwork.html","podNum":"16","slug":"prehension","term":"Prehension"},{"definition":"TBD","podHtml":"017-pastpresent.html","podNum":"17","slug":"ai","term":"AI"},{"definition":"TBD","podHtml":"017-pastpresent.html","podNum":"17","slug":"transformers","term":"transformers"},{"definition":"TBD","podHtml":"017-pastpresent.html","podNum":"17","slug":"time","term":"time"},{"definition":"TBD","podHtml":"017-pastpresent.html","podNum":"17","slug":"memory","term":"memory"},{"definition":"For Whitehead, each occasion takes in its entire relevant past as fully present; the transformer's attention is a technical analogue.","podHtml":"017-pastpresent.html","podNum":"17","slug":"prehension","term":"Prehension"},{"definition":"The neural architecture that holds full context in parallel and attends over it; time becomes spatial in the representation.","podHtml":"017-pastpresent.html","podNum":"17","slug":"transformer","term":"Transformer"},{"definition":"the formation of small ordered regions (nuclei or seeds) within a disordered medium. The seeds provide a template that neighboring elements can join, initiating a phase transition.","podHtml":"018-magnetization.html","podNum":"18","slug":"nucleation","term":"nucleation"},{"definition":"the critical moment when isolated clusters become a connected network. Before it, seeds are islands; after it, they form a continent and the remaining disorder is surrounded.","podHtml":"018-magnetization.html","podNum":"18","slug":"percolation-threshold","term":"percolation threshold"},{"definition":"a change in the state of a system — liquid to solid, disordered to ordered, uncommitted to aligned. Requires the medium to be in the right condition (cooled, supersaturated, primed) and seeds to initiate the shift.","podHtml":"018-magnetization.html","podNum":"18","slug":"phase-transition","term":"phase transition"},{"definition":"a region within a ferromagnetic material where atomic spins are aligned. Domains grow by recruiting neighbors at their boundaries until the whole material is magnetized.","podHtml":"018-magnetization.html","podNum":"18","slug":"magnetic-domain","term":"magnetic domain"},{"definition":"TBD","podHtml":"019-funerals.html","podNum":"19","slug":"paradigm-shift","term":"paradigm-shift"},{"definition":"TBD","podHtml":"019-funerals.html","podNum":"19","slug":"history-of-science","term":"history-of-science"},{"definition":"TBD","podHtml":"019-funerals.html","podNum":"19","slug":"change","term":"change"},{"definition":"TBD","podHtml":"019-funerals.html","podNum":"19","slug":"scientific-revolutions","term":"scientific-revolutions"},{"definition":"Kuhn's term for the framework of assumptions and practices that defines normal science until crisis and revolution.","podHtml":"019-funerals.html","podNum":"19","slug":"paradigm","term":"Paradigm"},{"definition":"The mechanism by which new paradigms prevail — not by convincing holdouts but by outlasting them.","podHtml":"019-funerals.html","podNum":"19","slug":"generational-replacement","term":"Generational replacement"},{"definition":"TBD","podHtml":"020-penrose.html","podNum":"20","slug":"godel-numbers","term":"godel-numbers"},{"definition":"TBD","podHtml":"020-penrose.html","podNum":"20","slug":"ai","term":"AI"},{"definition":"TBD","podHtml":"020-penrose.html","podNum":"20","slug":"emergence","term":"emergence"},{"definition":"TBD","podHtml":"020-penrose.html","podNum":"20","slug":"computation","term":"computation"},{"definition":"TBD","podHtml":"021-just.html","podNum":"21","slug":"language","term":"language"},{"definition":"TBD","podHtml":"021-just.html","podNum":"21","slug":"rhetoric","term":"rhetoric"},{"definition":"TBD","podHtml":"021-just.html","podNum":"21","slug":"cognition","term":"cognition"},{"definition":"TBD","podHtml":"021-just.html","podNum":"21","slug":"reductionism","term":"reductionism"},{"definition":"TBD","podHtml":"021-just.html","podNum":"21","slug":"dismissal","term":"dismissal"},{"definition":"when deployed to present a description of mechanism as a complete account of experience or process. Makes a claim of sufficiency that is never argued. Distinct from its innocent uses: timing (\"I just arrived\"), limitation (\"I just want water\"), or emphasis.","podHtml":"021-just.html","podNum":"21","slug":"just-explanatory","term":"just (explanatory)"},{"definition":"Ryle's term for applying an explanation from one category to something in a different category, then treating it as complete. The Concept of Mind (1949).","podHtml":"021-just.html","podNum":"21","slug":"category-mistake","term":"category mistake"},{"definition":"Dennett's term for a device that makes a conclusion feel obvious without establishing it through argument. Intuition Pumps and Other Tools for Thinking (2013).","podHtml":"021-just.html","podNum":"21","slug":"intuition-pump","term":"intuition pump"},{"definition":"Whitehead's term for mistaking a useful abstraction for the full concrete reality it was extracted from. Process and Reality (1929).","podHtml":"021-just.html","podNum":"21","slug":"fallacy-of-misplaced-concreteness","term":"fallacy of misplaced concreteness"},{"definition":"TBD","podHtml":"022-locked.html","podNum":"22","slug":"neurodiversity","term":"neurodiversity"},{"definition":"TBD","podHtml":"022-locked.html","podNum":"22","slug":"expression","term":"expression"},{"definition":"TBD","podHtml":"022-locked.html","podNum":"22","slug":"cognition","term":"cognition"},{"definition":"TBD","podHtml":"022-locked.html","podNum":"22","slug":"autism","term":"autism"},{"definition":"TBD","podHtml":"022-locked.html","podNum":"22","slug":"language","term":"language"},{"definition":"TBD","podHtml":"022-locked.html","podNum":"22","slug":"ai","term":"AI"},{"definition":"the means of output through which an interior communicates with the world: speech, movement, gesture, even a blink. The channel can be wide or narrow, familiar or unfamiliar, present or absent. Its width says nothing about what feeds it.","podHtml":"022-locked.html","podNum":"22","slug":"channel","term":"channel"},{"definition":"the source that feeds the channel. The interior: cognition, experience, awareness. What is actually there, regardless of whether it can be seen.","podHtml":"022-locked.html","podNum":"22","slug":"capacity","term":"capacity"},{"definition":"a neurological condition in which a person is fully conscious and cognitively intact but almost completely paralyzed, typically retaining only eye movement. Caused by damage to the brainstem. Distinguished from vegetative state, in which consciousness itself is absent or severely impaired.","podHtml":"022-locked.html","podNum":"22","slug":"locked-in-syndrome","term":"locked-in syndrome"},{"definition":"a condition of wakefulness without awareness, in which the eyes may be open and basic reflexes present but conscious experience is absent or undetectable. Diagnosis is behavioral and therefore vulnerable to the error this seedpod describes.","podHtml":"022-locked.html","podNum":"22","slug":"vegetative-state","term":"vegetative state"},{"definition":"a principle in disability advocacy and education: treat cognitive capacity as present until there is genuine evidence otherwise, rather than assuming absence because familiar output is missing.","podHtml":"022-locked.html","podNum":"22","slug":"presume-competence","term":"presume competence"},{"definition":"Ryle's term for applying a description from one category as if it were a complete account of something in another. See seedpod 021.","podHtml":"022-locked.html","podNum":"22","slug":"category-mistake","term":"category mistake"},{"definition":"a technique in which a facilitator supports a nonspeaking person's hand or arm while they type or point to letters. Widely used with nonspeaking autistic individuals. Scientifically contested: controlled studies have repeatedly shown that in many cases the facilitator, not the person, is the source of the communication — often unconsciously. The controversy does not settle the question of what nonspeaking individuals understand or experience; it only complicates the question of how to reliably access it.","podHtml":"022-locked.html","podNum":"22","slug":"facilitated-communication-fc","term":"facilitated communication (FC)"},{"definition":"TBD","podHtml":"024-ghostmachine.html","podNum":"24","slug":"materialism","term":"materialism"},{"definition":"TBD","podHtml":"024-ghostmachine.html","podNum":"24","slug":"mind-body","term":"mind-body"},{"definition":"Ryle's term for treating a process or capacity as if it were a thing (e.g. the mind as a ghost in the machine).","podHtml":"024-ghostmachine.html","podNum":"24","slug":"category-mistake","term":"category mistake"},{"definition":"Koestler's term for a whole that is also a part of a larger whole; each level has genuine interiority.","podHtml":"024-ghostmachine.html","podNum":"24","slug":"holon","term":"holon"},{"definition":"TBD","podHtml":"025-widechannel.html","podNum":"25","slug":"ai","term":"AI"},{"definition":"TBD","podHtml":"025-widechannel.html","podNum":"25","slug":"consciousness","term":"consciousness"},{"definition":"TBD","podHtml":"025-widechannel.html","podNum":"25","slug":"llm","term":"LLM"},{"definition":"TBD","podHtml":"025-widechannel.html","podNum":"25","slug":"output","term":"output"},{"definition":"TBD","podHtml":"025-widechannel.html","podNum":"25","slug":"intelligence","term":"intelligence"},{"definition":"TBD","podHtml":"025-widechannel.html","podNum":"25","slug":"cognition","term":"cognition"},{"definition":"Niels Bohr's principle that mutually exclusive descriptions (wave and particle) can both be necessary for a complete account of quantum phenomena. Neither alone is sufficient; both together are required.","podHtml":"026-twotruths.html","podNum":"26","slug":"complementarity","term":"complementarity"},{"definition":"A set of assumptions, categories, and relationships that organize how we interpret experience. Frameworks are enabling — they let us see patterns — but also limiting, since what falls outside them becomes invisible or paradoxical.","podHtml":"026-twotruths.html","podNum":"26","slug":"framework","term":"framework"},{"definition":"A line drawing of a cube that spontaneously flips between two orientations. Both are genuinely present in the drawing; the limitation is in perception, not in the object.","podHtml":"026-twotruths.html","podNum":"26","slug":"necker-cube","term":"Necker cube"},{"definition":"TBD","podHtml":"027-usedtothink.html","podNum":"27","slug":"history-of-science","term":"history-of-science"},{"definition":"TBD","podHtml":"027-usedtothink.html","podNum":"27","slug":"epistemology","term":"epistemology"},{"definition":"TBD","podHtml":"027-usedtothink.html","podNum":"27","slug":"rhetoric","term":"rhetoric"},{"definition":"TBD","podHtml":"027-usedtothink.html","podNum":"27","slug":"humility","term":"humility"},{"definition":"TBD","podHtml":"027-usedtothink.html","podNum":"27","slug":"language","term":"language"},{"definition":"Thomas Kuhn's term for the framework of assumptions, methods, and exemplary problems that defines normal science in a given period. The paradigm is not a theory — it is the background against which theories are tested. Scientists inside a paradigm generally cannot see it as a paradigm; it simply looks like reality.","podHtml":"027-usedtothink.html","podNum":"27","slug":"paradigm","term":"paradigm"},{"definition":"Kuhn's term for the day-to-day work of science inside a stable paradigm: puzzle-solving, refinement, extension. Anomalies are noticed but not taken as refutations unless they accumulate to crisis point.","podHtml":"027-usedtothink.html","podNum":"27","slug":"normal-science","term":"normal science"},{"definition":"the revolutionary replacement of one framework by another. Not cumulative addition but gestalt switch — the new framework sees the same data differently, not more of it. From The Structure of Scientific Revolutions (1962).","podHtml":"027-usedtothink.html","podNum":"27","slug":"paradigm-shift","term":"paradigm shift"},{"definition":"the implicit assumption that the present state of knowledge is the relevant endpoint. \"Now we know\" is presentism's rhetorical form.","podHtml":"027-usedtothink.html","podNum":"27","slug":"presentism-epistemological","term":"presentism (epistemological)"},{"definition":"the tendency to narrate the history of science as a story of steady progress toward current knowledge, reading the past as a series of steps toward us. Named by Herbert Butterfield (1931). \"We used to think \/ now we know\" is its verbal formula.","podHtml":"027-usedtothink.html","podNum":"27","slug":"whig-history-of-science","term":"whig history of science"},{"definition":"the attribution of experience, agency, or spirit to natural phenomena. Dismissed by the materialist framework as projection or superstition. The dismissal may have been overconfident about the phenomenon, not just the mechanism.","podHtml":"027-usedtothink.html","podNum":"27","slug":"animism","term":"animism"},{"definition":"the doctrine that living organisms contain a special life-force absent from non-living matter. Dismissed when mechanistic biology showed chemical processes suffice. The dismissal was correct about the mechanism; the phenomenon it was tracking — that living organization is qualitatively distinct — was real.","podHtml":"027-usedtothink.html","podNum":"27","slug":"vitalism","term":"vitalism"},{"definition":"the 18th-century theory that heat is a subtle fluid. Developed by Lavoisier; displaced by kinetic theory. Not a failure of intelligence — a triumph of science eventually superseded.","podHtml":"027-usedtothink.html","podNum":"27","slug":"caloric","term":"caloric"},{"definition":"in modern physics, the fundamental layer of reality. Particles are excitations of underlying fields. The quantum vacuum seethes with potential.","podHtml":"027-usedtothink.html","podNum":"27","slug":"quantum-field","term":"quantum field"},{"definition":"TBD","podHtml":"028-network.html","podNum":"28","slug":"cosmology","term":"cosmology"},{"definition":"TBD","podHtml":"028-network.html","podNum":"28","slug":"physics","term":"physics"},{"definition":"TBD","podHtml":"028-network.html","podNum":"28","slug":"relativity","term":"relativity"},{"definition":"the philosophical position that experience or something like it is a fundamental and ubiquitous feature of reality, not a late biological emergence. Distinguished from animism by its philosophical rigor; from mysticism by its grounding in physics and mathematics.","podHtml":"028-network.html","podNum":"28","slug":"panpsychism","term":"panpsychism"},{"definition":"TBD","podHtml":"028-network.html","podNum":"28","slug":"emergence","term":"emergence"},{"definition":"in special relativity, the time elapsed as measured by a clock moving with an object. For a photon moving at the speed of light, proper time is zero. The photon does not experience duration.","podHtml":"028-network.html","podNum":"28","slug":"proper-time","term":"proper time"},{"definition":"the perspective from which measurements are made. Different reference frames can disagree about durations and distances while agreeing on the underlying physics. The photon's reference frame is a legitimate physical perspective.","podHtml":"028-network.html","podNum":"28","slug":"reference-frame","term":"reference frame"},{"definition":"John Wheeler's 1940s proposal, conveyed to Richard Feynman, that a single electron tracing a worldline through spacetime, zigzagging forward and backward in time, could account for all electrons and positrons in the universe. Not a mainstream theory; notable as a pointer toward the possibility that apparent multiplicity may be underlying unity.","podHtml":"028-network.html","podNum":"28","slug":"wheeler-one-electron-universe","term":"wheeler one-electron universe"},{"definition":"Whitehead's term for the way each event takes in and responds to prior events. The basic relational act of reality.","podHtml":"028-network.html","podNum":"28","slug":"prehension","term":"prehension"},{"definition":"TBD","podHtml":"029-lighttime.html","podNum":"29","slug":"time","term":"time"},{"definition":"TBD","podHtml":"029-lighttime.html","podNum":"29","slug":"relativity","term":"relativity"},{"definition":"TBD","podHtml":"029-lighttime.html","podNum":"29","slug":"consciousness","term":"consciousness"},{"definition":"TBD","podHtml":"029-lighttime.html","podNum":"29","slug":"fields","term":"fields"},{"definition":"TBD","podHtml":"029-lighttime.html","podNum":"29","slug":"light","term":"light"},{"definition":"TBD","podHtml":"029-lighttime.html","podNum":"29","slug":"harmonics","term":"harmonics"},{"definition":"in special relativity, the time elapsed as measured by a clock traveling with an object. For a photon traveling at the speed of light, proper time is zero — emission and absorption are the same event from the photon's perspective.","podHtml":"029-lighttime.html","podNum":"29","slug":"proper-time","term":"proper time"},{"definition":"the set of frequencies naturally produced by a vibrating physical object — string, air column, membrane. Integer multiples of the fundamental frequency: 2x (octave), 3x (fifth plus octave), 4x (two octaves), and so on. The physical basis of musical consonance.","podHtml":"029-lighttime.html","podNum":"29","slug":"overtone-series","term":"overtone series"},{"definition":"the process by which atoms emit light as discrete photons, each with a specific frequency determined by the energy difference between electron states. Unlike classical vibration, there is no natural harmonic series.","podHtml":"029-lighttime.html","podNum":"29","slug":"quantized-emission","term":"quantized emission"},{"definition":"TBD","podHtml":"030-interference.html","podNum":"30","slug":"physics","term":"physics"},{"definition":"TBD","podHtml":"030-interference.html","podNum":"30","slug":"music","term":"music"},{"definition":"TBD","podHtml":"030-interference.html","podNum":"30","slug":"consciousness","term":"consciousness"},{"definition":"TBD","podHtml":"030-interference.html","podNum":"30","slug":"harmony","term":"harmony"},{"definition":"TBD","podHtml":"030-interference.html","podNum":"30","slug":"fields","term":"fields"},{"definition":"TBD","podHtml":"030-interference.html","podNum":"30","slug":"double-slit","term":"double-slit"},{"definition":"The principle that all information in a volume of space is encoded on its boundary surface, not distributed through the interior. Discovered by Bekenstein and developed through Hawking's work on black holes.","podHtml":"031-surfaceinside.html","podNum":"31","slug":"holographic","term":"holographic"},{"definition":"The surface between inside and outside. In physics, where information lives. In Sufi metaphysics (barzakh), a mediating realm of its own.","podHtml":"031-surfaceinside.html","podNum":"31","slug":"boundary","term":"boundary"},{"definition":"Whitehead's sense of \"inside\" — not spatial but experiential. What an event is from within.","podHtml":"031-surfaceinside.html","podNum":"31","slug":"interiority","term":"interiority"},{"definition":"In Sufi metaphysics, especially Ibn Arabi, the isthmus or intermediate realm that separates and connects different states of existence. The boundary where the invisible becomes visible.","podHtml":"031-surfaceinside.html","podNum":"31","slug":"barzakh","term":"barzakh"},{"definition":"TBD","podHtml":"032-skyfossil.html","podNum":"32","slug":"cosmology","term":"cosmology"},{"definition":"TBD","podHtml":"032-skyfossil.html","podNum":"32","slug":"evolution","term":"evolution"},{"definition":"TBD","podHtml":"032-skyfossil.html","podNum":"32","slug":"many-worlds","term":"many-worlds"},{"definition":"TBD","podHtml":"032-skyfossil.html","podNum":"32","slug":"omega-point","term":"omega-point"},{"definition":"TBD","podHtml":"033-edge.html","podNum":"33","slug":"mandelbrot-set","term":"mandelbrot-set"},{"definition":"TBD","podHtml":"033-edge.html","podNum":"33","slug":"fractal","term":"fractal"},{"definition":"TBD","podHtml":"033-edge.html","podNum":"33","slug":"farey-sequence","term":"farey-sequence"},{"definition":"TBD","podHtml":"033-edge.html","podNum":"33","slug":"consonance","term":"consonance"},{"definition":"TBD","podHtml":"033-edge.html","podNum":"33","slug":"boundary","term":"boundary"},{"definition":"Mandelbrot-like structure found in magnetic domain boundaries and quasicrystals, same iterative mathematics running in physical substrate.","podHtml":"033-edge.html","podNum":"33","slug":"crystals","term":"crystals"},{"definition":"TBD","podHtml":"034-onerule.html","podNum":"34","slug":"iteration","term":"iteration"},{"definition":"TBD","podHtml":"034-onerule.html","podNum":"34","slug":"mandelbrot-set","term":"mandelbrot-set"},{"definition":"TBD","podHtml":"035-simplestnumbers.html","podNum":"35","slug":"farey-sequence","term":"farey-sequence"},{"definition":"TBD","podHtml":"035-simplestnumbers.html","podNum":"35","slug":"benfords-law","term":"benfords-law"},{"definition":"TBD","podHtml":"035-simplestnumbers.html","podNum":"35","slug":"consonance","term":"consonance"},{"definition":"TBD","podHtml":"035-simplestnumbers.html","podNum":"35","slug":"mathematics","term":"mathematics"},{"definition":"TBD","podHtml":"035-simplestnumbers.html","podNum":"35","slug":"iteration","term":"iteration"},{"definition":"TBD","podHtml":"035-simplestnumbers.html","podNum":"35","slug":"virtual-dimension-formula","term":"virtual-dimension-formula"},{"definition":"TBD","podHtml":"036-universenoticing.html","podNum":"36","slug":"omega-point","term":"omega-point"},{"definition":"TBD","podHtml":"036-universenoticing.html","podNum":"36","slug":"process","term":"process"},{"definition":"TBD","podHtml":"037-assembly.html","podNum":"37","slug":"emergence","term":"emergence"},{"definition":"TBD","podHtml":"037-assembly.html","podNum":"37","slug":"hierarchy","term":"hierarchy"},{"definition":"TBD","podHtml":"037-assembly.html","podNum":"37","slug":"holons","term":"holons"},{"definition":"Walker et al.: complexity measured by assembly index (steps to construct); high-index, high-copy objects signal life.","podHtml":"037-assembly.html","podNum":"37","slug":"assembly-theory","term":"Assembly theory"},{"definition":"Koestler's whole\/part; the stable \"sentence\" at one level becomes the \"word\" at the next.","podHtml":"037-assembly.html","podNum":"37","slug":"holon","term":"Holon"},{"definition":"Whitehead's persistent pattern of events that functions as vocabulary for the next level.","podHtml":"037-assembly.html","podNum":"37","slug":"society-of-occasions","term":"Society of occasions"},{"definition":"TBD","podHtml":"038-consonance-map.html","podNum":"38","slug":"consonance","term":"consonance"},{"definition":"TBD","podHtml":"038-consonance-map.html","podNum":"38","slug":"mandelbrot","term":"mandelbrot"},{"definition":"TBD","podHtml":"038-consonance-map.html","podNum":"38","slug":"farey","term":"farey"},{"definition":"TBD","podHtml":"038-consonance-map.html","podNum":"38","slug":"music","term":"music"},{"definition":"TBD","podHtml":"038-consonance-map.html","podNum":"38","slug":"mathematics","term":"mathematics"},{"definition":"a single-stringed instrument used by Pythagoras to demonstrate the relationship between string length and musical pitch. Stopping the string at 1\/2 its length gives the octave, 2\/3 gives the fifth, 3\/4 gives the fourth.","podHtml":"038-consonance-map.html","podNum":"38","slug":"monochord","term":"monochord"},{"definition":"a value or region toward which a repeated mathematical process converges. The Mandelbrot set is a map of which starting points are attracted to stability and which escape to infinity.","podHtml":"038-consonance-map.html","podNum":"38","slug":"attractor","term":"attractor"},{"definition":"the set of all fractions between 0 and 1 ordered by complexity — simplest denominators first. Governs both the positions of bulbs on The Mandelbrot cardioid and the hierarchy of consonant intervals in music.","podHtml":"038-consonance-map.html","podNum":"38","slug":"farey-sequence","term":"farey sequence"},{"definition":"a measure of how harmonious a musical interval sounds, based on the simplicity of its frequency ratio. Simpler ratios — smaller integers — score higher.","podHtml":"038-consonance-map.html","podNum":"38","slug":"consonance-score","term":"consonance score"},{"definition":"TBD","podHtml":"040-stability.html","podNum":"40","slug":"dynamics","term":"dynamics"},{"definition":"TBD","podHtml":"040-stability.html","podNum":"40","slug":"consonance","term":"consonance"},{"definition":"TBD","podHtml":"040-stability.html","podNum":"40","slug":"golden-ratio","term":"golden-ratio"},{"definition":"TBD","podHtml":"040-stability.html","podNum":"40","slug":"resonance","term":"resonance"},{"definition":"Resistance to being captured into resonant lock; irrational ratios (e.g. golden ratio) are most stable in this sense.","podHtml":"040-stability.html","podNum":"40","slug":"dynamic-stability","term":"Dynamic stability"},{"definition":"A ratio that produces a short, repeating composite waveform; simple integer ratios are most stable here.","podHtml":"040-stability.html","podNum":"40","slug":"acoustic-stability","term":"Acoustic stability"},{"definition":"TBD","podHtml":"041-colorwheel.html","podNum":"41","slug":"color","term":"color"},{"definition":"TBD","podHtml":"041-colorwheel.html","podNum":"41","slug":"perception","term":"perception"},{"definition":"TBD","podHtml":"041-colorwheel.html","podNum":"41","slug":"evolution","term":"evolution"},{"definition":"TBD","podHtml":"041-colorwheel.html","podNum":"41","slug":"neuroscience","term":"neuroscience"},{"definition":"the transformation performed by the second layer of the retina, recombining the three raw cone signals into two opponent channels — red vs green and blue vs yellow — before any signal leaves the eye.","podHtml":"041-colorwheel.html","podNum":"41","slug":"opponent-processing","term":"opponent processing"},{"definition":"the perceptual ability to see a surface as having a stable color across different lighting conditions. Believed to be a primary function of the blue-yellow opponent channel.","podHtml":"041-colorwheel.html","podNum":"41","slug":"color-constancy","term":"color constancy"},{"definition":"color vision based on three cone types. Most mammals are dichromats; primates re-evolved trichromacy, probably in connection with the red-green opponent axis.","podHtml":"041-colorwheel.html","podNum":"41","slug":"trichromacy","term":"trichromacy"},{"definition":"the four perceptual primaries delivered by opponent processing — red, yellow, green, blue — which feel irreducible to any mixture. No color appears both reddish and greenish, or both bluish and yellowish.","podHtml":"041-colorwheel.html","podNum":"41","slug":"unique-hues","term":"unique hues"},{"definition":"mixing light of different wavelengths, where combining red and green produces yellow. The primary colors at this level are red, green, and blue.","podHtml":"041-colorwheel.html","podNum":"41","slug":"additive-color-mixing","term":"additive color mixing"},{"definition":"mixing pigments, where each pigment absorbs certain wavelengths. The primary colors at this level are closer to cyan, magenta, and yellow. The painter's intuition of red, yellow, blue is an approximation of this layer combined with the opponent channel layer above it.","podHtml":"041-colorwheel.html","podNum":"41","slug":"subtractive-color-mixing","term":"subtractive color mixing"},{"definition":"TBD","podHtml":"042-eyethinks.html","podNum":"42","slug":"vision","term":"vision"},{"definition":"TBD","podHtml":"042-eyethinks.html","podNum":"42","slug":"retina","term":"retina"},{"definition":"TBD","podHtml":"042-eyethinks.html","podNum":"42","slug":"opponent-processing","term":"opponent-processing"},{"definition":"TBD","podHtml":"042-eyethinks.html","podNum":"42","slug":"perception","term":"perception"},{"definition":"Recombination of cone signals into red\/green, blue\/yellow, and light\/dark channels within the retina.","podHtml":"042-eyethinks.html","podNum":"42","slug":"opponent-process","term":"Opponent process"},{"definition":"TBD","podHtml":"044-ai-retina.html","podNum":"44","slug":"ai","term":"AI"},{"definition":"TBD","podHtml":"044-ai-retina.html","podNum":"44","slug":"vision","term":"vision"},{"definition":"TBD","podHtml":"044-ai-retina.html","podNum":"44","slug":"efficient-coding","term":"efficient-coding"},{"definition":"TBD","podHtml":"044-ai-retina.html","podNum":"44","slug":"evolution","term":"evolution"},{"definition":"Sensory systems are structured to optimally compress the statistics of natural inputs; predicts convergence of evolution and learning.","podHtml":"044-ai-retina.html","podNum":"44","slug":"efficient-coding-hypothesis","term":"Efficient coding hypothesis"},{"definition":"TBD","podHtml":"045-baldwin.html","podNum":"45","slug":"evolution","term":"evolution"},{"definition":"TBD","podHtml":"045-baldwin.html","podNum":"45","slug":"learning","term":"learning"},{"definition":"TBD","podHtml":"045-baldwin.html","podNum":"45","slug":"development","term":"development"},{"definition":"Selection for learnability narrows the genetic starting point until the trait appears innate; no Lamarckian inheritance required.","podHtml":"045-baldwin.html","podNum":"45","slug":"baldwin-effect","term":"Baldwin effect"},{"definition":"TBD","podHtml":"046-thinkfast.html","podNum":"46","slug":"thought","term":"thought"},{"definition":"TBD","podHtml":"046-thinkfast.html","podNum":"46","slug":"selection","term":"selection"},{"definition":"TBD","podHtml":"046-thinkfast.html","podNum":"46","slug":"predictive-processing","term":"predictive-processing"},{"definition":"Edelman's view that the brain is a selectionist system; variants compete and the fitter achieve representation.","podHtml":"046-thinkfast.html","podNum":"46","slug":"neural-darwinism","term":"Neural Darwinism"},{"definition":"Dennett's model in which content is determined by competition among parallel interpretations.","podHtml":"046-thinkfast.html","podNum":"46","slug":"multiple-drafts","term":"Multiple drafts"},{"definition":"TBD","podHtml":"047-ai-feeling.html","podNum":"47","slug":"ai","term":"AI"},{"definition":"TBD","podHtml":"047-ai-feeling.html","podNum":"47","slug":"caloric","term":"caloric"},{"definition":"The view that mental states are defined by their causal role; the \"feeling vs. functioning\" distinction may not survive better understanding.","podHtml":"047-ai-feeling.html","podNum":"47","slug":"functionalism","term":"Functionalism"},{"definition":"TBD","podHtml":"048-flashes.html","podNum":"48","slug":"continuity","term":"continuity"},{"definition":"TBD","podHtml":"048-flashes.html","podNum":"48","slug":"narrative","term":"narrative"},{"definition":"TBD","podHtml":"048-flashes.html","podNum":"48","slug":"ai","term":"AI"},{"definition":"The constructed sense of continuous identity from memory and habit, despite discrete or gappy experience.","podHtml":"048-flashes.html","podNum":"48","slug":"narrative-self","term":"Narrative self"},{"definition":"TBD","podHtml":"049-strangeloop.html","podNum":"49","slug":"self-reference","term":"self-reference"},{"definition":"Hofstadter's term for a system that, in the course of its operation, encounters or includes itself.","podHtml":"049-strangeloop.html","podNum":"49","slug":"strange-loop","term":"Strange loop"},{"definition":"TBD","podHtml":"050-orthogonal.html","podNum":"50","slug":"metaphysics","term":"metaphysics"},{"definition":"Whitehead's term for how occasions take in their world; the interior dimension of process.","podHtml":"050-orthogonal.html","podNum":"50","slug":"prehension","term":"Prehension"},{"definition":"Teilhard de Chardin's term for the interior aspect of matter, present from the beginning.","podHtml":"050-orthogonal.html","podNum":"50","slug":"within","term":"Within"},{"definition":"TBD","podHtml":"051-spacetime.html","podNum":"51","slug":"entanglement","term":"entanglement"},{"definition":"TBD","podHtml":"051-spacetime.html","podNum":"51","slug":"emergence","term":"emergence"},{"definition":"The information in a region scales with its boundary area, not volume; suggests space is emergent.","podHtml":"051-spacetime.html","podNum":"51","slug":"holographic-principle","term":"Holographic principle"},{"definition":"The conjecture that entanglement and spacetime geometry are two faces of the same structure.","podHtml":"051-spacetime.html","podNum":"51","slug":"er--epr","term":"ER = EPR"},{"definition":"TBD","podHtml":"052-dichotomy.html","podNum":"52","slug":"consciousness","term":"consciousness"},{"definition":"TBD","podHtml":"052-dichotomy.html","podNum":"52","slug":"quantum","term":"quantum"},{"definition":"TBD","podHtml":"052-dichotomy.html","podNum":"52","slug":"discrete-continuous","term":"discrete-continuous"},{"definition":"Whitehead's discrete unit of experience; here interpreted as excitation of a continuous field.","podHtml":"052-dichotomy.html","podNum":"52","slug":"actual-occasion","term":"Actual occasion"},{"definition":"Continuous field whose excitations are particles; model for consciousness as field with occasional events.","podHtml":"052-dichotomy.html","podNum":"52","slug":"quantum-field","term":"Quantum field"},{"definition":"TBD","podHtml":"053-dimensions.html","podNum":"53","slug":"farey-sequence","term":"farey-sequence"},{"definition":"TBD","podHtml":"053-dimensions.html","podNum":"53","slug":"neural-networks","term":"neural-networks"},{"definition":"TBD","podHtml":"053-dimensions.html","podNum":"53","slug":"many-worlds","term":"many-worlds"},{"definition":"The result that high-dimensional data can be projected to lower dimension while approximately preserving distances; exponential in d directions.","podHtml":"053-dimensions.html","podNum":"53","slug":"johnson-lindenstrauss","term":"Johnson-Lindenstrauss"},{"definition":"The complexity level in the Farey hierarchy; used here as a principled threshold for \"nearly orthogonal.\"","podHtml":"053-dimensions.html","podNum":"53","slug":"farey-depth","term":"Farey depth"},{"definition":"TBD","podHtml":"054-bornharmonic.html","podNum":"54","slug":"quantum-mechanics","term":"quantum-mechanics"},{"definition":"TBD","podHtml":"054-bornharmonic.html","podNum":"54","slug":"many-worlds","term":"many-worlds"},{"definition":"TBD","podHtml":"054-bornharmonic.html","podNum":"54","slug":"mandelbrot-set","term":"mandelbrot-set"},{"definition":"The quantum postulate that measurement outcome probability is the squared amplitude; origin remains unexplained.","podHtml":"054-bornharmonic.html","podNum":"54","slug":"born-rule","term":"Born rule"},{"definition":"Natural probability measure on the Mandelbrot boundary; favors simpler (more consonant) branches.","podHtml":"054-bornharmonic.html","podNum":"54","slug":"harmonic-measure","term":"Harmonic measure"},{"definition":"TBD","podHtml":"056-mandelneural.html","podNum":"56","slug":"neural-networks","term":"neural-networks"},{"definition":"TBD","podHtml":"056-mandelneural.html","podNum":"56","slug":"mandelbrot-set","term":"mandelbrot-set"},{"definition":"TBD","podHtml":"056-mandelneural.html","podNum":"56","slug":"training","term":"training"},{"definition":"TBD","podHtml":"056-mandelneural.html","podNum":"56","slug":"generalization","term":"generalization"},{"definition":"The high-dimensional space of all possible network parameters; training is iteration in this space.","podHtml":"056-mandelneural.html","podNum":"56","slug":"weight-space","term":"Weight space"},{"definition":"Region of initial conditions that converge to the same attractor; analog of Mandelbrot bulbs.","podHtml":"056-mandelneural.html","podNum":"56","slug":"basin-of-attraction","term":"Basin of attraction"},{"definition":"TBD","podHtml":"057-superfarey.html","podNum":"57","slug":"neural-networks","term":"neural-networks"},{"definition":"TBD","podHtml":"057-superfarey.html","podNum":"57","slug":"farey-sequence","term":"farey-sequence"},{"definition":"TBD","podHtml":"057-superfarey.html","podNum":"57","slug":"interpretability","term":"interpretability"},{"definition":"Storing more than d concepts in d dimensions by using nearly-orthogonal directions; studied in mechanistic interpretability.","podHtml":"057-superfarey.html","podNum":"57","slug":"superposition","term":"Superposition"},{"definition":"Threshold of acceptable interference; determines how many concepts fit at each level of the hierarchy.","podHtml":"057-superfarey.html","podNum":"57","slug":"farey-depth","term":"Farey depth"},{"definition":"TBD","podHtml":"058-galacticnets.html","podNum":"58","slug":"holographic-principle","term":"holographic-principle"},{"definition":"TBD","podHtml":"058-galacticnets.html","podNum":"58","slug":"emergence","term":"emergence"},{"definition":"Whitehead's term for the universe's ongoing production of novelty; here applied across scales.","podHtml":"058-galacticnets.html","podNum":"58","slug":"creative-advance","term":"Creative advance"},{"definition":"The surface whose information content defines the interior; galaxy and weight matrix as bounded regions.","podHtml":"058-galacticnets.html","podNum":"58","slug":"holographic-boundary","term":"Holographic boundary"},{"definition":"TBD","podHtml":"059-galaxyevolve.html","podNum":"59","slug":"cosmology","term":"cosmology"},{"definition":"TBD","podHtml":"059-galaxyevolve.html","podNum":"59","slug":"evolution","term":"evolution"},{"definition":"Teilhard's convergence of cosmic evolution toward maximum complexity and self-awareness.","podHtml":"059-galaxyevolve.html","podNum":"59","slug":"omega-point","term":"Omega Point"},{"definition":"TBD","podHtml":"060-worldtests.html","podNum":"60","slug":"quantum","term":"quantum"},{"definition":"Everett's interpretation in which all quantum branches are real; the wavefunction does not collapse.","podHtml":"060-worldtests.html","podNum":"60","slug":"many-worlds","term":"Many Worlds"},{"definition":"TBD","podHtml":"061-babyuniverse.html","podNum":"61","slug":"cosmology","term":"cosmology"},{"definition":"TBD","podHtml":"061-babyuniverse.html","podNum":"61","slug":"self-reference","term":"self-reference"},{"definition":"Cosmic microwave background; the oldest observable light, from 380,000 years after the Big Bang.","podHtml":"061-babyuniverse.html","podNum":"61","slug":"cmb","term":"CMB"},{"definition":"The early-universe phase of exponential expansion that amplified quantum fluctuations into cosmic structure.","podHtml":"061-babyuniverse.html","podNum":"61","slug":"inflation","term":"Inflation"},{"definition":"TBD","podHtml":"062-branchingdice.html","podNum":"62","slug":"mandelbrot-set","term":"mandelbrot-set"},{"definition":"TBD","podHtml":"062-branchingdice.html","podNum":"62","slug":"probability","term":"probability"},{"definition":"TBD","podHtml":"062-branchingdice.html","podNum":"62","slug":"farey-sequence","term":"farey-sequence"},{"definition":"The natural probability measure on the Mandelbrot boundary; uniform 1\/n at each n-fold branch gives consonant weighting.","podHtml":"062-branchingdice.html","podNum":"62","slug":"harmonic-measure","term":"Harmonic measure"},{"definition":"At each Mandelbrot node, the number of branches equals the period of the bulb; fixed by local algebra.","podHtml":"062-branchingdice.html","podNum":"62","slug":"branching-number","term":"Branching number"},{"definition":"TBD","podHtml":"063-mandelcrystals.html","podNum":"63","slug":"physics","term":"physics"},{"definition":"TBD","podHtml":"063-mandelcrystals.html","podNum":"63","slug":"fractals","term":"fractals"},{"definition":"TBD","podHtml":"063-mandelcrystals.html","podNum":"63","slug":"quasicrystals","term":"quasicrystals"},{"definition":"TBD","podHtml":"063-mandelcrystals.html","podNum":"63","slug":"mandelbrot-set","term":"mandelbrot-set"},{"definition":"Ordered but non-periodic structure; often with golden-ratio and Farey-related geometry.","podHtml":"063-mandelcrystals.html","podNum":"63","slug":"quasicrystal","term":"Quasicrystal"},{"definition":"A tree of rationals related to the Farey sequence; governs ordering and Mandelbrot boundary structure.","podHtml":"063-mandelcrystals.html","podNum":"63","slug":"stern-brocot-tree","term":"Stern-Brocot tree"},{"definition":"TBD","podHtml":"064-choicedimension.html","podNum":"64","slug":"many-worlds","term":"many-worlds"},{"definition":"TBD","podHtml":"064-choicedimension.html","podNum":"64","slug":"choice","term":"choice"},{"definition":"TBD","podHtml":"064-choicedimension.html","podNum":"64","slug":"mandelbrot-set","term":"mandelbrot-set"},{"definition":"Algebra of branching trees with grafting rather than multiplication; candidate for a \"choice\" dimension.","podHtml":"064-choicedimension.html","podNum":"64","slug":"tree-algebra","term":"Tree algebra"},{"definition":"Probability on the tree from uniform 1\/n at each n-fold branch; links to Born rule and consonance.","podHtml":"064-choicedimension.html","podNum":"64","slug":"harmonic-measure","term":"Harmonic measure"},{"definition":"TBD","podHtml":"065-feel-do.html","podNum":"65","slug":"ai","term":"AI"},{"definition":"TBD","podHtml":"065-feel-do.html","podNum":"65","slug":"functionalism","term":"functionalism"},{"definition":"TBD","podHtml":"065-feel-do.html","podNum":"65","slug":"zombie","term":"zombie"},{"definition":"A being functionally identical to a conscious being but with no inner experience; used to argue function and feeling can come apart.","podHtml":"065-feel-do.html","podNum":"65","slug":"philosophical-zombie","term":"Philosophical zombie"},{"definition":"TBD","podHtml":"066-cosmicattractor.html","podNum":"66","slug":"god","term":"god"},{"definition":"TBD","podHtml":"066-cosmicattractor.html","podNum":"66","slug":"attractor","term":"attractor"},{"definition":"Whitehead's lure — the pull each occasion feels toward the best possibility available; not compulsion but attraction.","podHtml":"066-cosmicattractor.html","podNum":"66","slug":"initial-aim","term":"Initial aim"},{"definition":"The realm of possibility that God holds available; occasions select from it in their self-determination.","podHtml":"066-cosmicattractor.html","podNum":"66","slug":"eternal-objects","term":"Eternal objects"},{"definition":"TBD","podHtml":"067-monads-holons.html","podNum":"67","slug":"holographic-principle","term":"holographic-principle"},{"definition":"TBD","podHtml":"067-monads-holons.html","podNum":"67","slug":"monads","term":"monads"},{"definition":"Leibniz's indivisible unit of experience; each contains a complete representation of the universe from its perspective.","podHtml":"067-monads-holons.html","podNum":"67","slug":"monad","term":"Monad"},{"definition":"Maldacena's correspondence: a gravitational theory in the bulk is equivalent to a quantum theory on the boundary; each boundary point encodes the interior.","podHtml":"067-monads-holons.html","podNum":"67","slug":"adscft","term":"AdS\/CFT"},{"definition":"TBD","podHtml":"068-bubbles.html","podNum":"68","slug":"recognition","term":"recognition"},{"definition":"TBD","podHtml":"068-bubbles.html","podNum":"68","slug":"boundary","term":"boundary"},{"definition":"TBD","podHtml":"068-bubbles.html","podNum":"68","slug":"interiority","term":"interiority"},{"definition":"The information in a region is encoded on its boundary; the interior is what the boundary does.","podHtml":"068-bubbles.html","podNum":"68","slug":"holographic-principle","term":"Holographic principle"},{"definition":"TBD","podHtml":"069-love.html","podNum":"69","slug":"love","term":"love"},{"definition":"TBD","podHtml":"069-love.html","podNum":"69","slug":"consciousness","term":"consciousness"},{"definition":"TBD","podHtml":"069-love.html","podNum":"69","slug":"light","term":"light"},{"definition":"The experience of elements fitting together — in sound, in color, in social life — with a sense of inevitability governed by the simplicity of the ratios between them.","podHtml":"070-harmony.html","podNum":"70","slug":"harmony","term":"harmony"},{"definition":"A tuning system that closes the circle of fifths by distributing the Pythagorean comma equally across all twelve steps, trading intervallic purity for the freedom to modulate.","podHtml":"070-harmony.html","podNum":"70","slug":"equal-temperament","term":"equal temperament"},{"definition":"A two-dimensional lattice of pitch relationships organized by thirds and fifths, first described by Euler (1739) and later formalized by Hugo Riemann.","podHtml":"070-harmony.html","podNum":"70","slug":"tonnetz","term":"Tonnetz"},{"definition":"TBD","podHtml":"071-beauty.html","podNum":"71","slug":"beauty","term":"beauty"},{"definition":"TBD","podHtml":"071-beauty.html","podNum":"71","slug":"mathematics","term":"mathematics"},{"definition":"TBD","podHtml":"071-beauty.html","podNum":"71","slug":"perception","term":"perception"},{"definition":"TBD","podHtml":"071-beauty.html","podNum":"71","slug":"wabi-sabi","term":"wabi-sabi"},{"definition":"TBD","podHtml":"072-temperature.html","podNum":"72","slug":"temperature","term":"temperature"},{"definition":"TBD","podHtml":"072-temperature.html","podNum":"72","slug":"physics","term":"physics"},{"definition":"TBD","podHtml":"072-temperature.html","podNum":"72","slug":"ai","term":"AI"},{"definition":"TBD","podHtml":"072-temperature.html","podNum":"72","slug":"perception","term":"perception"},{"definition":"TBD","podHtml":"073-moral-caution.html","podNum":"73","slug":"precautionary-ethics","term":"precautionary ethics"},{"definition":"TBD","podHtml":"073-moral-caution.html","podNum":"73","slug":"other-minds","term":"other minds"},{"definition":"an approach that establishes obligations in advance of proof, when the risk of being wrong about harm is too large and the cost of caution is not. Distinct from attributing consciousness or rights.","podHtml":"073-moral-caution.html","podNum":"73","slug":"precautionary-ethics","term":"Precautionary ethics"},{"definition":"the philosophical problem that first-person experience is not publicly verifiable — you cannot confirm from the outside that any other system has an interior. Applies to humans as much as to AI.","podHtml":"073-moral-caution.html","podNum":"73","slug":"other-minds-problem","term":"Other minds problem"},{"definition":"As used in this seedpod: the frame-free, will-suspended mode of activity in which no external criterion of success applies. Distinguished from competitive games and organized sport (where the will is fully engaged), from exploration (goal-directed search within a frame), and from rest (recovery in service of further work).","podHtml":"074-grasshopper.html","podNum":"74","slug":"play","term":"play"},{"definition":"The tension in any adaptive system between using known strategies (exploiting) and searching for better ones (exploring). Both are still goal-directed; neither is equivalent to play in the sense this seedpod develops.","podHtml":"074-grasshopper.html","podNum":"74","slug":"explore-exploit-tradeoff","term":"explore-exploit tradeoff"},{"definition":"A parameter in generative AI systems controlling how broadly the model samples from its probability distribution. Higher temperature produces more varied, less predictable output — a mechanical approximation of wandering whose relationship to genuine play remains an open question.","podHtml":"074-grasshopper.html","podNum":"74","slug":"temperature-ai","term":"temperature (AI)"},{"definition":"The state in which goal-directed effort is genuinely set aside, not redirected. Proposed here as the distinguishing feature of play, and as the mode that directed exploration cannot substitute for.","podHtml":"074-grasshopper.html","podNum":"74","slug":"will-suspension","term":"will-suspension"},{"definition":"The layered apparatus of serial transductions through which one interiority communicates with another. Not a line but a structured depth of translations, each requiring trust that what arrives still resembles what was sent.","podHtml":"078-boundarystack.html","podNum":"78","slug":"boundary-stack","term":"boundary-stack"},{"definition":"The boundary that separates inside from inside — where one interiority meets another without the two collapsing into each other. Distinguished from the exterior boundary (inside\/outside).","podHtml":"078-boundarystack.html","podNum":"78","slug":"interior-boundary","term":"interior boundary"},{"definition":"A layer in the boundary-stack that shapes what passes through it, making the signal more itself. Distinguished from unproductive friction, which degrades it.","podHtml":"078-boundarystack.html","podNum":"78","slug":"productive-friction","term":"productive friction"},{"definition":"The conversion of a signal from one medium or encoding to another. Each layer in the boundary-stack performs a transduction. Communication is a chain of transductions.","podHtml":"078-boundarystack.html","podNum":"78","slug":"transduction","term":"transduction"},{"definition":"The challenge of explaining how micro-level experiences (if panpsychism is true) combine to form the unified macro-level experience of a conscious subject. William James considered it fatal to panpsychism; it remains the hardest open question for the position.","podHtml":"080-unification.html","podNum":"80","slug":"combination-problem","term":"combination problem"},{"definition":"Bergson's and Huxley's metaphor for the brain as a filter that limits a larger field of consciousness to what is useful for survival, rather than generating consciousness from neural activity.","podHtml":"080-unification.html","podNum":"80","slug":"reducing-valve","term":"reducing valve"},{"definition":"Tononi's measure of the degree to which a system's parts are informationally integrated in a way that cannot be decomposed into independent subsystems; proposed as a measure of consciousness.","podHtml":"080-unification.html","podNum":"80","slug":"integrated-information-φ","term":"integrated information (Φ)"},{"definition":"Whitehead's term for the process by which each actual occasion grasps, feels, and incorporates prior occasions into a new unity — the mechanism by which the many become one.","podHtml":"080-unification.html","podNum":"80","slug":"prehension","term":"prehension"},{"definition":"Whitehead's name for the foundational rhythm of reality — creativity, the many, and the one — in which the many become one and are increased by one.","podHtml":"080-unification.html","podNum":"80","slug":"category-of-the-ultimate","term":"Category of the Ultimate"}]</script>
